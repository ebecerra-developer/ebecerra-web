<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --brand-bg: #047857;
    --brand-fg: #fafaf9;
    --brand-primary: #065f46;
    --brand-accent: #ff6f59;
    --brand-font-display: 'Inter', sans-serif;
    --brand-font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; font-family: var(--brand-font-body); }
  .cover {
    width: 1080px; height: 1920px;
    background: var(--brand-bg);
    color: var(--brand-fg);
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  /* La destacada en IG se ve en un círculo de ~360px centrado.
     Lo que ve el usuario está dentro del círculo central. */
  .safe-frame {
    width: 520px; height: 520px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    text-align: center;
  }
  .frame-corners::before,
  .frame-corners::after,
  .frame-corners > span::before,
  .frame-corners > span::after {
    content: ""; position: absolute;
    width: 36px; height: 36px;
    border: 4px solid var(--brand-accent);
  }
  .frame-corners::before { top: 0; left: 0; border-right: 0; border-bottom: 0; }
  .frame-corners::after { top: 0; right: 0; border-left: 0; border-bottom: 0; }
  .frame-corners > span::before { bottom: 0; left: 0; border-right: 0; border-top: 0; }
  .frame-corners > span::after { bottom: 0; right: 0; border-left: 0; border-top: 0; }
  .word {
    font-family: var(--brand-font-display);
    font-size: 120px; line-height: 1;
    letter-spacing: -0.03em;
    font-weight: 900;
    margin-bottom: 18px;
  }
  .sublabel {
    font-size: 22px; font-weight: 700;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--brand-accent);
    opacity: 0.9;
  }
</style>
</head>
<body>
  <div class="cover">
    <div class="safe-frame frame-corners">
      <span></span>
      <div class="word">{{word}}</div>
      <div class="sublabel">{{sublabel}}</div>
    </div>
  </div>
</body>
</html>
