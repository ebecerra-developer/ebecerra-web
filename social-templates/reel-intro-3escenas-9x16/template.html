<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --brand-bg: #047857;
    --brand-fg: #fafaf9;
    --brand-primary: #065f46;
    --brand-accent: #ff6f59;
    --brand-font-display: 'Inter', sans-serif;
    --brand-font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; font-family: var(--brand-font-body); overflow: hidden; }
  .stage {
    position: relative;
    width: 1080px; height: 1920px;
    background: var(--brand-bg);
    color: var(--brand-fg);
    overflow: hidden;
  }

  /* Blobs decorativos sutiles — viven detrás de todas las escenas. */
  .blob1, .blob2 {
    position: absolute; border-radius: 50%; pointer-events: none;
    z-index: 1;
  }
  .blob1 {
    width: 560px; height: 560px;
    background: var(--brand-primary);
    top: -200px; right: -180px;
    opacity: 0.45;
  }
  .blob2 {
    width: 360px; height: 360px;
    background: var(--brand-accent);
    bottom: -140px; left: -120px;
    opacity: 0.14;
  }

  /* Cada escena ocupa toda la stage y se overlapan. Top-aligned para que el
     título caiga al mismo y en las 3 escenas — sin saltos al hacer crossfade. */
  .scene {
    position: absolute;
    inset: 0;
    padding: 280px 90px 260px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  /* Slot del kicker — alto fijo aunque algunas escenas no lo usen (mantiene
     el título al mismo y baseline). */
  .kicker-slot {
    height: 60px;
    margin-bottom: 36px;
  }
  .kicker {
    font-size: 28px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--brand-accent);
    line-height: 1;
  }

  /* Slot del título — alto fijo (~450px) para que .sub/.handle-pill empiecen
     siempre desde el mismo offset. */
  .title-slot {
    min-height: 450px;
    display: flex; align-items: flex-start;
  }
  .big {
    font-family: var(--brand-font-display);
    font-size: 116px; font-weight: 900;
    letter-spacing: -0.045em; line-height: 0.95;
    text-shadow: 0 4px 24px rgba(0,0,0,0.28);
  }
  .big em {
    font-style: normal;
    color: var(--brand-accent);
  }

  .sub {
    margin-top: 24px;
    font-size: 36px; font-weight: 500;
    letter-spacing: -0.01em; line-height: 1.32;
    opacity: 0.92;
    max-width: 880px;
  }

  .handle-pill {
    margin-top: 24px;
    display: inline-block;
    background: var(--brand-fg);
    color: var(--brand-bg);
    font-size: 46px; font-weight: 800;
    letter-spacing: -0.01em;
    padding: 22px 42px;
    border-radius: 999px;
    transform-origin: left center;
  }
</style>
</head>
<body>
  <div class="stage">
    <span class="blob1"></span>
    <span class="blob2"></span>

    <div class="scene" id="s1">
      <div class="kicker-slot"><div class="kicker">{{kicker}}</div></div>
      <div class="title-slot"><div class="big js-emify" data-text="{{scene1Title}}"></div></div>
    </div>

    <div class="scene" id="s2">
      <div class="kicker-slot"></div>
      <div class="title-slot"><div class="big js-emify" data-text="{{scene2Title}}"></div></div>
      <div class="sub">{{scene2Sub}}</div>
    </div>

    <div class="scene" id="s3">
      <div class="kicker-slot"></div>
      <div class="title-slot"><div class="big js-emify" data-text="{{scene3Title}}"></div></div>
      <span class="handle-pill">{{handle}}</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    // Sustituye *palabras* por <em>palabras</em>.
    function emify(text) {
      return text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }
    document.querySelectorAll('.js-emify').forEach(function(el) {
      el.innerHTML = emify(el.getAttribute('data-text') || '');
    });

    const FADE_OUT = { immediateRender: false };
    const tl = gsap.timeline({ defaults: { ease: "power3.out" }, paused: true });
    window.__tl = tl;

    // ── Estado inicial (frame 0 thumbnail-safe: S1 100% visible) ──
    gsap.set("#s1", { opacity: 1 });
    gsap.set("#s1 .kicker", { y: 0, opacity: 1 });
    gsap.set("#s1 .big",    { y: 0, opacity: 1 });
    gsap.set("#s2", { opacity: 0 });
    gsap.set("#s3", { opacity: 0 });

    // ── S1 (visible 0 → 2.7s, fade-out 2.7 → 3.2s) ──
    tl.fromTo("#s1", { opacity: 1 }, { opacity: 0, duration: 0.5, ...FADE_OUT }, 2.7);

    // ── S2 (in 3.2 → 6.6s, fade-out 6.6 → 7.1s) ──
    tl.fromTo("#s2",      { opacity: 0 }, { opacity: 1, duration: 0.4 }, 3.2);
    tl.fromTo("#s2 .big", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.85 }, 3.4);
    tl.fromTo("#s2 .sub", { y: 16, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7 },  4.4);
    tl.fromTo("#s2", { opacity: 1 }, { opacity: 0, duration: 0.5, ...FADE_OUT }, 6.6);

    // ── S3 (in 7.1 → 8.5s, hold 8.5 → 10s) ──
    tl.fromTo("#s3",              { opacity: 0 }, { opacity: 1, duration: 0.4 }, 7.1);
    tl.fromTo("#s3 .big",         { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8 }, 7.3);
    tl.fromTo("#s3 .handle-pill", { scale: 0.78, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.55 }, 8.1);

    // Tween dummy invisible para que la timeline tenga duración total = 10s
    // (hold final de 1.5s para que el usuario lea el CTA).
    tl.to({}, { duration: 1.5 }, 8.5);
  </script>
</body>
</html>
