<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --brand-bg: #047857;
    --brand-fg: #fafaf9;
    --brand-primary: #065f46;
    --brand-accent: #ff6f59;
    --brand-font-display: 'Inter', sans-serif;
    --brand-font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; font-family: var(--brand-font-body); overflow: hidden; }
  .stage {
    position: relative;
    width: 1080px; height: 1920px;
    background: var(--brand-bg);
    color: var(--brand-fg);
    overflow: hidden;
  }
  .blob1, .blob2 {
    position: absolute; border-radius: 50%; pointer-events: none;
  }
  .blob1 {
    width: 620px; height: 620px;
    background: var(--brand-primary);
    top: -200px; right: -180px;
    opacity: 0.65;
    z-index: 1;
  }
  .blob2 {
    width: 380px; height: 380px;
    background: var(--brand-accent);
    bottom: -130px; left: -100px;
    opacity: 0.22;
    z-index: 1;
  }
  .corner {
    position: absolute;
    top: 80px; left: 80px;
    display: inline-flex; align-items: center; gap: 14px;
    color: var(--brand-fg);
    font-weight: 800; font-size: 24px;
    z-index: 12;
  }
  .corner .dot {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--brand-fg);
    color: var(--brand-bg);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900;
  }

  /* Cada scene ocupa toda la stage y se overlapa con z-index */
  .scene {
    position: absolute;
    inset: 0;
    padding: 260px 90px 240px;
    z-index: 11;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
  }
  .kicker {
    font-size: 26px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--brand-accent);
    margin-bottom: 40px;
  }
  .big {
    font-family: var(--brand-font-display);
    font-size: 130px; font-weight: 900;
    letter-spacing: -0.045em; line-height: 0.92;
    text-shadow: 0 4px 24px rgba(0,0,0,0.32);
  }
  .big em {
    font-style: normal;
    color: var(--brand-accent);
  }
  .sub {
    margin-top: 50px;
    font-size: 38px; font-weight: 500;
    letter-spacing: -0.01em; line-height: 1.32;
    opacity: 0.92;
    color: var(--brand-fg);
  }
  #s2 .big { font-size: 104px; }
  #s3 .big { font-size: 120px; }

  .handle-pill {
    margin-top: 60px;
    display: inline-block;
    background: var(--brand-fg);
    color: var(--brand-bg);
    font-size: 48px; font-weight: 800;
    letter-spacing: -0.01em;
    padding: 22px 42px;
    border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="stage">
    <span class="blob1"></span>
    <span class="blob2"></span>
    <div class="corner"><span class="dot">{{brand.monogram}}</span> {{handle}}</div>

    <div class="scene" id="s1">
      <div class="kicker">{{kicker}}</div>
      <div class="big js-emify" data-text="{{scene1Title}}"></div>
    </div>
    <div class="scene" id="s2">
      <div class="big js-emify" data-text="{{scene2Title}}"></div>
      <div class="sub">{{scene2Sub}}</div>
    </div>
    <div class="scene" id="s3">
      <div class="big js-emify" data-text="{{scene3Title}}"></div>
      <span class="handle-pill">{{handle}}</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    // Sustituye *palabras* del campo por <em>palabras</em> para énfasis inline.
    function emify(text) {
      return text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }
    document.querySelectorAll('.js-emify').forEach(function(el) {
      el.innerHTML = emify(el.getAttribute('data-text') || '');
    });

    const FADE_OUT = { immediateRender: false };
    const tl = gsap.timeline({ defaults: { ease: "power3.out" }, paused: true });
    window.__tl = tl;

    // Estado inicial: S1 visible, S2/S3 ocultas. S1 frame 0 = thumbnail safe.
    gsap.set("#s1", { opacity: 1 });
    gsap.set("#s2", { opacity: 0 });
    gsap.set("#s3", { opacity: 0 });

    // S1 (0 → 3.0s) — fade-out al final
    tl.fromTo("#s1 .kicker", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6 }, 0.0);
    tl.fromTo("#s1 .big",    { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8 }, 0.3);
    tl.fromTo("#s1", { opacity: 1 }, { opacity: 0, duration: 0.5, ...FADE_OUT }, 2.7);

    // S2 (3.2 → 6.8s)
    tl.fromTo("#s2", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 3.2);
    tl.fromTo("#s2 .big",  { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.85 }, 3.4);
    tl.fromTo("#s2 .sub",  { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7 },  4.4);
    tl.fromTo("#s2", { opacity: 1 }, { opacity: 0, duration: 0.5, ...FADE_OUT }, 6.6);

    // S3 (6.9 → 8.0s) — luego hold 2s hasta 10s
    tl.fromTo("#s3", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 6.9);
    tl.fromTo("#s3 .big",         { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8 }, 7.1);
    tl.fromTo("#s3 .handle-pill", { scale: 0.7, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.55 }, 7.9);
    // Hold final hasta 10s: la timeline no necesita más tweens, basta con que la
    // duración total seekable cubra 10s. Truco: tween dummy invisible.
    tl.to({}, { duration: 1.5 }, 8.5);
  </script>
</body>
</html>
