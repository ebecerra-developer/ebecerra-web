<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --brand-bg: #047857;
    --brand-fg: #fafaf9;
    --brand-primary: #065f46;
    --brand-accent: #ff6f59;
    --brand-font-display: 'Inter', sans-serif;
    --brand-font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; font-family: var(--brand-font-body); }
  .story {
    width: 1080px; height: 1920px;
    background: var(--brand-bg);
    color: var(--brand-fg);
    padding: 220px 90px 200px;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
    justify-content: center;
    text-align: center;
  }
  .blob1 {
    position: absolute; border-radius: 50%; pointer-events: none;
    width: 580px; height: 580px;
    background: var(--brand-primary);
    top: -200px; right: -180px;
    opacity: 0.65;
  }
  .blob2 {
    position: absolute; border-radius: 50%; pointer-events: none;
    width: 360px; height: 360px;
    background: var(--brand-accent);
    bottom: -140px; left: -100px;
    opacity: 0.22;
  }
  .kicker {
    position: relative; z-index: 1;
    color: var(--brand-fg); opacity: 0.6;
    margin-bottom: 60px;
    font-size: 26px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .hook {
    position: relative; z-index: 1;
    font-family: var(--brand-font-display);
    font-size: 124px; line-height: 1.02; letter-spacing: -0.04em;
    font-weight: 900;
    margin-bottom: 50px;
  }
  .subline {
    position: relative; z-index: 1;
    font-size: 38px; font-weight: 500;
    color: var(--brand-accent);
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .brand-mark {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    z-index: 1;
    color: var(--brand-fg); font-size: 26px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 14px;
  }
  .brand-mark__logo { height: 44px; width: auto; display: block; }
  .brand-mark__dot {
    background: var(--brand-fg); color: var(--brand-bg);
    width: 38px; height: 38px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 16px;
  }
</style>
</head>
<body>
  <div class="story">
    <span class="blob1"></span>
    <span class="blob2"></span>
    <p class="kicker">{{kicker}}</p>
    <div class="hook">{{hook}}</div>
    <div class="subline">{{subline}}</div>
    <span class="brand-mark">{{{brand.markHtml}}}{{handle}}</span>
  </div>
</body>
</html>
