<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --brand-bg: #047857;
    --brand-fg: #fafaf9;
    --brand-primary: #065f46;
    --brand-accent: #ff6f59;
    --brand-font-display: 'Inter', sans-serif;
    --brand-font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; font-family: var(--brand-font-body); }
  .post {
    width: 1080px; height: 1350px;
    background: var(--brand-bg);
    color: var(--brand-fg);
    padding: 110px 90px 100px;
    position: relative;
    overflow: hidden;
  }
  .kicker {
    color: var(--brand-fg); opacity: 0.6;
    margin-bottom: 28px;
    font-size: 19px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
  }
  h1 {
    font-family: var(--brand-font-display);
    font-size: 142px; line-height: 0.94; letter-spacing: -0.04em;
    font-weight: 900; margin-bottom: 96px;
  }
  h1 em {
    font-style: normal;
    color: var(--brand-accent);
    font-weight: 900;
  }
  .list { display: flex; flex-direction: column; gap: 36px; }
  .item { display: flex; gap: 30px; align-items: flex-start; }
  .item__check {
    width: 64px; height: 64px; border-radius: 18px;
    background: var(--brand-primary);
    color: var(--brand-accent);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-weight: 900; font-size: 36px; line-height: 1;
  }
  .item__text {
    font-size: 36px; line-height: 1.2; font-weight: 700;
    letter-spacing: -0.01em; padding-top: 8px;
  }
  .brand-mark {
    position: absolute; bottom: 60px; left: 90px;
    color: var(--brand-fg); font-size: 22px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 12px;
  }
  .brand-mark__logo { height: 36px; width: auto; display: block; }
  .brand-mark__dot {
    background: var(--brand-fg); color: var(--brand-bg);
    width: 32px; height: 32px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px;
  }
</style>
</head>
<body>
  <div class="post">
    <p class="kicker">{{kicker}}</p>
    <h1>{{titleStart}} <em>{{titleEmphasis}}</em><br/>{{titleEnd}}</h1>
    <div class="list">
      {{#each items}}
      <div class="item">
        <span class="item__check">&#x2713;</span>
        <span class="item__text">{{this}}</span>
      </div>
      {{/each}}
    </div>
    <span class="brand-mark">{{{brand.markHtml}}}{{handle}}</span>
  </div>
</body>
</html>
