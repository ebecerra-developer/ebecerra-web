<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --brand-bg: #047857; --brand-fg: #fafaf9;
    --brand-primary: #065f46; --brand-accent: #ff6f59;
    --brand-font-display: 'Inter', sans-serif; --brand-font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; font-family: var(--brand-font-body); overflow: hidden; }
  .stage {
    position: relative; width: 1080px; height: 1920px;
    background: var(--brand-bg); color: var(--brand-fg); overflow: hidden;
    padding: 280px 90px 240px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .marks {
    font-family: var(--brand-font-display);
    font-size: 240px; line-height: 0.6; color: var(--brand-accent);
    font-weight: 900; margin-bottom: 10px;
  }
  .quote { display: flex; flex-direction: column; gap: 6px; margin-bottom: 70px; }
  .qline {
    font-family: var(--brand-font-display);
    font-size: 118px; font-weight: 900; line-height: 1.0; letter-spacing: -0.04em;
  }
  .qline em { font-style: normal; color: var(--brand-accent); }
  .author {
    padding-top: 30px;
    border-top: 2px solid color-mix(in srgb, var(--brand-fg) 35%, transparent);
    display: flex; flex-direction: column; gap: 6px;
  }
  .author__name { font-size: 36px; font-weight: 800; letter-spacing: -0.01em; }
  .author__role { font-size: 26px; font-weight: 500; opacity: 0.72; }
  .brand-mark {
    position: absolute; bottom: 90px; right: 90px;
    color: var(--brand-fg); font-size: 26px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 14px;
  }
  .brand-mark__logo { height: 44px; width: auto; display: block; }
  .brand-mark__dot {
    background: var(--brand-fg); color: var(--brand-bg);
    width: 38px; height: 38px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 16px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="marks">&ldquo;</div>
    <div class="quote" id="quote">
      {{#each quoteLines}}
      <div class="qline js-emify" data-text="{{this}}"></div>
      {{/each}}
    </div>
    <div class="author">
      <div class="author__name">{{author}}</div>
      <div class="author__role">{{authorRole}}</div>
    </div>
    <span class="brand-mark">{{{brand.markHtml}}}{{handle}}</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    function emify(t){ return t.replace(/\*([^*]+)\*/g,'<em>$1</em>'); }
    document.querySelectorAll('.js-emify').forEach(function(el){ el.innerHTML = emify(el.getAttribute('data-text')||''); });

    const tl = gsap.timeline({ defaults: { ease: "power3.out" }, paused: true });
    window.__tl = tl;

    const lines = gsap.utils.toArray("#quote .qline");

    // Frame 0: comilla + primera línea visibles (thumbnail-safe), resto oculto.
    gsap.set(".marks", { opacity: 0.9 });
    gsap.set(lines, { opacity: 0, y: 30 });
    gsap.set(lines[0], { opacity: 1, y: 0 });
    gsap.set(".author", { opacity: 0, y: 20 });

    // Líneas restantes aparecen cada 1.1s
    lines.forEach((el, i) => {
      if (i === 0) return;
      tl.fromTo(el, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.6 }, 0.9 + (i - 1) * 1.1);
    });

    const afterLines = 0.9 + (lines.length - 1) * 1.1 + 0.6;
    tl.fromTo(".author", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6 }, afterLines + 0.3);
    tl.to({}, { duration: 2.5 }, afterLines + 1.0); // hold final
  </script>
</body>
</html>
