<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --brand-bg: #047857;
    --brand-fg: #fafaf9;
    --brand-primary: #065f46;
    --brand-accent: #ff6f59;
    --brand-font-display: 'Inter', sans-serif;
    --brand-font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; font-family: var(--brand-font-body); }
  .story {
    width: 1080px; height: 1920px;
    background: var(--brand-bg);
    color: var(--brand-fg);
    padding: 220px 90px 240px;
    position: relative;
    overflow: hidden;
  }
  .kicker {
    color: var(--brand-fg); opacity: 0.6;
    margin-bottom: 26px;
    font-size: 24px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
  }
  h1 {
    font-family: var(--brand-font-display);
    font-size: 136px; line-height: 0.96; letter-spacing: -0.04em;
    font-weight: 900; margin-bottom: 70px;
  }
  .body {
    font-size: 38px; line-height: 1.32;
    font-weight: 500;
    max-width: 900px;
    letter-spacing: -0.01em;
    opacity: 0.92;
  }
  .cta {
    position: absolute; bottom: 280px; left: 90px;
    background: var(--brand-accent);
    color: var(--brand-bg);
    padding: 28px 56px;
    border-radius: 999px;
    font-size: 34px; font-weight: 800;
    letter-spacing: -0.01em;
    display: inline-flex; align-items: center; gap: 18px;
  }
  .cta__arrow {
    font-size: 30px;
    line-height: 1;
  }
  .brand-mark {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    color: var(--brand-fg); font-size: 26px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 14px;
  }
  .brand-mark__logo { height: 44px; width: auto; display: block; }
  .brand-mark__dot {
    background: var(--brand-fg); color: var(--brand-bg);
    width: 38px; height: 38px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 16px;
  }
</style>
</head>
<body>
  <div class="story">
    <p class="kicker">{{kicker}}</p>
    <h1>{{title}}</h1>
    <div class="body">{{body}}</div>
    <span class="cta">{{ctaText}}<span class="cta__arrow">&rarr;</span></span>
    <span class="brand-mark">{{{brand.markHtml}}}{{handle}}</span>
  </div>
</body>
</html>
