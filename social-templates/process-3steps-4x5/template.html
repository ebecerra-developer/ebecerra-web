<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --brand-bg: #047857;
    --brand-fg: #fafaf9;
    --brand-primary: #065f46;
    --brand-accent: #ff6f59;
    --brand-font-display: 'Inter', sans-serif;
    --brand-font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; font-family: var(--brand-font-body); }
  .post {
    width: 1080px; height: 1350px;
    background: var(--brand-bg);
    color: var(--brand-fg);
    padding: 96px 80px 90px;
    position: relative;
    overflow: hidden;
  }
  .kicker {
    color: var(--brand-fg); opacity: 0.6;
    margin-bottom: 16px;
    font-size: 19px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
  }
  h1 {
    font-family: var(--brand-font-display);
    font-size: 80px; line-height: 0.96; letter-spacing: -0.035em;
    font-weight: 900; margin-bottom: 56px;
  }
  .steps { display: flex; flex-direction: column; gap: 24px; }
  .step {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 30px;
    background: color-mix(in srgb, var(--brand-fg) 7%, transparent);
    border-radius: 20px;
    padding: 28px 36px;
    align-items: center;
  }
  .step__num {
    font-family: var(--brand-font-display);
    font-size: 110px;
    line-height: 1; font-weight: 900;
    color: var(--brand-accent);
    letter-spacing: -0.05em;
  }
  .step__body { display: flex; flex-direction: column; gap: 4px; }
  .step__title {
    font-size: 30px; font-weight: 800;
    letter-spacing: -0.015em;
  }
  .step__desc {
    font-size: 22px; line-height: 1.32;
    opacity: 0.82;
    font-weight: 500;
  }
  .brand-mark {
    position: absolute; bottom: 50px; left: 80px;
    color: var(--brand-fg); font-size: 22px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 12px;
  }
  .brand-mark__logo { height: 36px; width: auto; display: block; }
  .brand-mark__dot {
    background: var(--brand-fg); color: var(--brand-bg);
    width: 32px; height: 32px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px;
  }
</style>
</head>
<body>
  <div class="post">
    <p class="kicker">{{kicker}}</p>
    <h1>{{title}}</h1>
    <div class="steps">
      <div class="step">
        <div class="step__num">01</div>
        <div class="step__body">
          <div class="step__title">{{step1Title}}</div>
          <div class="step__desc">{{step1Desc}}</div>
        </div>
      </div>
      <div class="step">
        <div class="step__num">02</div>
        <div class="step__body">
          <div class="step__title">{{step2Title}}</div>
          <div class="step__desc">{{step2Desc}}</div>
        </div>
      </div>
      <div class="step">
        <div class="step__num">03</div>
        <div class="step__body">
          <div class="step__title">{{step3Title}}</div>
          <div class="step__desc">{{step3Desc}}</div>
        </div>
      </div>
    </div>
    <span class="brand-mark">{{{brand.markHtml}}}{{handle}}</span>
  </div>
</body>
</html>
