<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  .slide-1 {
    justify-content: center;
  }
  .slide-1 h1 {
    font-size: 128px;
    line-height: 0.92;
    letter-spacing: -0.045em;
    font-weight: 900;
    color: var(--cream);
    margin-bottom: 32px;
  }
  .slide-1 h1 em {
    font-style: normal;
    color: #FFE4B5;
    font-weight: 900;
  }
  .slide-1 .lead {
    font-size: 32px;
    line-height: 1.25;
    font-weight: 500;
    max-width: 760px;
    opacity: 0.92;
  }
  .blob1, .blob2 {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .blob1 { width: 380px; height: 380px; background: var(--green-deeper); top: -120px; right: -100px; opacity: 0.5; }
  .blob2 { width: 280px; height: 280px; background: var(--coral); bottom: -80px; left: -60px; opacity: 0.18; }
</style>
</head>
<body>
  <div class="slide slide--green slide-1">
    <span class="blob1"></span>
    <span class="blob2"></span>
    <p class="kicker">// portfolio</p>
    <h1>4 demos.<br/><em>4 tipos</em><br/>de cliente.</h1>
    <p class="lead">Mira lo que puedes tener antes de encargar nada.</p>
    <p class="page-num">01 / 07</p>
    <span class="swipe">desliza →</span>
    <span class="brand-mark"><span class="brand-mark__dot">eB</span>ebecerra.es</span>
  </div>
</body>
</html>
