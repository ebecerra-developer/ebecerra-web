<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Invert</title></head>
<body style="margin:0;background:#fff;">
<canvas id="c" width="512" height="512"></canvas>
<script>
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, 512, 512);
    const data = ctx.getImageData(0, 0, 512, 512);
    const px = data.data;
    // Source: green BG #047857 + white eB shape.
    // Target: cream BG #FAFAF9 + green eB shape #047857.
    // Decide pixel by pixel: if it's "more white-ish" => paint green; else => paint cream.
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], g = px[i+1], b = px[i+2];
      // luminance approx
      const lum = 0.2126*r + 0.7152*g + 0.0722*b;
      if (lum > 180) {
        // was white -> paint green
        px[i] = 0x04; px[i+1] = 0x78; px[i+2] = 0x57; px[i+3] = 255;
      } else {
        // was green -> paint cream
        px[i] = 0xFA; px[i+1] = 0xFA; px[i+2] = 0xF9; px[i+3] = 255;
      }
    }
    ctx.putImageData(data, 0, 0);
    // Expose data URL for retrieval
    window.__inverted = c.toDataURL('image/png');
    document.title = 'READY';
  };
  img.src = '../personal/avatars/avatar-eB-green-512.png';
</script>
</body></html>
