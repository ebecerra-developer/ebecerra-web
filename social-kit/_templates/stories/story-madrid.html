<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" />
<style>
  :root { --green: #047857; --cream: #FAFAF9; --ink: #0A0A0A; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  .stage { position: relative; width: 1080px; height: 1920px; overflow: hidden; background: var(--ink); }
  .bg-photo {
    position: absolute; inset: 0;
    background-image: url("../../personal/yo/WhatsApp%20Image%202026-05-15%20at%2003.30.05.jpeg");
    background-size: cover;
    background-position: center 30%;
    filter: blur(4px) brightness(0.5) saturate(0.65);
    transform: scale(1.05);
    z-index: 0;
  }
  .bg-tint {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 25%, rgba(4,120,87,0.30) 0%, transparent 65%),
      linear-gradient(180deg, rgba(10,10,10,0.50) 0%, rgba(10,10,10,0.78) 100%);
    z-index: 1;
  }
  .stage::after {
    content: ""; position: absolute; inset: 0;
    pointer-events: none; opacity: 0.16;
    mix-blend-mode: overlay;
    background-image: radial-gradient(rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 10;
  }

  .corner {
    position: absolute; top: 80px; left: 80px;
    display: flex; align-items: center; gap: 14px;
    color: var(--cream);
    font-weight: 800; font-size: 26px;
    z-index: 12;
  }
  .corner .dot {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--cream); color: var(--green);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900;
  }

  /* Contenido condensado en tercio superior; tercio inferior libre para sticker IG */
  .scene {
    position: absolute;
    top: 240px;
    left: 80px; right: 80px;
    bottom: 50%; /* deja la mitad inferior libre */
    z-index: 11;
    color: var(--cream);
    display: flex; flex-direction: column;
    justify-content: flex-start; align-items: flex-start;
  }

  .kicker {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #6EE7B7;
    margin-bottom: 32px;
  }

  .pregunta {
    font-size: 92px;
    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 0.95;
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .pregunta em { font-style: normal; color: #6EE7B7; }

  .dilema {
    position: absolute;
    top: 850px;
    left: 80px; right: 80px;
    z-index: 11;
    color: var(--cream);
    display: flex; flex-direction: column;
    gap: 24px;
  }
  .row {
    display: flex; align-items: center; gap: 24px;
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--cream);
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .row .tag {
    background: var(--cream);
    color: var(--green);
    padding: 12px 22px;
    border-radius: 999px;
    font-weight: 800;
    font-size: 36px;
    flex-shrink: 0;
  }
  .row .tag--off {
    background: transparent;
    color: var(--cream);
    border: 3px solid rgba(250,250,249,0.85);
  }

  /* Pista del sticker en el tercio inferior */
  .sticker-hint {
    position: absolute;
    bottom: 200px;
    left: 80px; right: 80px;
    text-align: center;
    z-index: 11;
    color: rgba(250,250,249,0.55);
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .sticker-hint__dash {
    display: inline-block;
    width: 60px;
    height: 2px;
    background: rgba(250,250,249,0.4);
    vertical-align: middle;
    margin: 0 18px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="bg-photo"></div>
    <div class="bg-tint"></div>
    <div class="corner"><span class="dot">eB</span> pensando en alto</div>

    <div class="scene" id="head">
      <div class="kicker">Pensando en alto</div>
      <div class="pregunta">¿Pongo "<em>Madrid</em>"<br/>en mi bio?</div>
    </div>

    <div class="dilema" id="dilema">
      <div class="row" id="r1">
        <span class="tag">con Madrid</span>
        <span>pierdo gente de fuera</span>
      </div>
      <div class="row" id="r2">
        <span class="tag tag--off">sin Madrid</span>
        <span>pierdo gente de aquí</span>
      </div>
    </div>

    <div class="sticker-hint" id="hint">
      <span class="sticker-hint__dash"></span>
      vota aquí
      <span class="sticker-hint__dash"></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ defaults: { ease: "power3.out" }, paused: true });
    window.__tl = tl;
    window.__startAnim = () => tl.play(0);

    // Todo visible desde t=0 excepto los reveals
    gsap.set("#head", { opacity: 1 });
    gsap.set(".kicker", { opacity: 1, y: 0 });
    gsap.set(".pregunta", { opacity: 1, y: 0 });

    // Dilema entra escalonado
    tl.fromTo("#r1", { x: -60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.7 }, 1.5);
    tl.fromTo("#r2", { x: 60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.7 }, 2.4);

    // Hint del sticker aparece al final
    tl.fromTo("#hint", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.7 }, 4.2);
    // Pequeño pulse para llamar la atención al sticker
    tl.to("#hint", { scale: 1.06, duration: 0.5, yoyo: true, repeat: 3 }, 5.5);
  </script>
</body>
</html>
