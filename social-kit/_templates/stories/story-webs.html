<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@400;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1920px; overflow:hidden; font-family:'Inter',sans-serif; background:#FAFAF9; color:#0A0A0A; }
  .stage { width:1080px; height:1920px; padding:140px 80px 110px; display:flex; flex-direction:column; gap:48px; }
  .top { display:flex; align-items:center; gap:18px; }
  .top img { width:84px; height:84px; border-radius:20px; }
  .top span { font-size:32px; font-weight:700; color:#047857; }
  .headline { display:flex; flex-direction:column; gap:14px; }
  .headline .pre {
    font-family:'Cormorant Garamond',serif; font-style:italic; font-size:48px;
    font-weight:500; color:#047857;
  }
  .headline h1 {
    font-size:108px; font-weight:800; line-height:1.0; letter-spacing:-0.02em; color:#0A0A0A;
  }
  .headline h1 b { color:#047857; }
  .demos { display:flex; flex-direction:column; gap:28px; flex:1; }
  .demo {
    background:#fff; border:1px solid #E7E5E4; border-radius:28px; overflow:hidden;
    display:flex; align-items:center; gap:28px;
    padding:22px 28px 22px 22px;
    box-shadow:0 6px 18px rgba(0,0,0,0.04);
  }
  .demo .thumb {
    width:240px; height:160px;
    border-radius:16px; overflow:hidden;
    flex-shrink:0; background:#F0EDE8;
  }
  .demo .thumb img { width:100%; height:100%; object-fit:cover; object-position:left top; display:block; }
  .demo .body { display:flex; flex-direction:column; gap:6px; }
  .demo .name { font-size:36px; font-weight:700; line-height:1.1; color:#0A0A0A; }
  .demo .desc { font-size:24px; color:#555; font-weight:500; line-height:1.3; }
  .foot {
    text-align:center; font-size:38px; font-weight:700; color:#047857;
    margin-top:8px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="top"><img src="../../personal/avatars/avatar-eB-cream-512.png"><span>ebecerra.es</span></div>
    <div class="headline">
      <div class="pre">3 ejemplos reales · plantillas que puedo adaptar a tu negocio</div>
      <h1>Imagina<br><b>la tuya.</b></h1>
    </div>
    <div class="demos">
      <div class="demo">
        <div class="thumb"><img src="../../personal/captures/demo-equilibrio-desktop.png"></div>
        <div class="body">
          <div class="name">Clínica de fisioterapia</div>
          <div class="desc">Bilingüe · reservas online</div>
        </div>
      </div>
      <div class="demo">
        <div class="thumb"><img src="../../personal/captures/demo-marta-solana-desktop.png"></div>
        <div class="body">
          <div class="name">Coach de salud</div>
          <div class="desc">Estética cuidada · marca personal</div>
        </div>
      </div>
      <div class="demo">
        <div class="thumb"><img src="../../personal/captures/demo-claudia-entrena-desktop.png"></div>
        <div class="body">
          <div class="name">Entrenadora personal</div>
          <div class="desc">Capta clientes por Instagram</div>
        </div>
      </div>
    </div>
    <div class="foot">Visítalas en ebecerra.es 👇</div>
  </div>
</body>
</html>
