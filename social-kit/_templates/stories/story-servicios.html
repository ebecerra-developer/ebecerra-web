<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1920px; overflow:hidden; font-family:'Inter',sans-serif; background:#FAFAF9; color:#0A0A0A; }
  .stage { width:1080px; height:1920px; padding:120px 80px; display:flex; flex-direction:column; gap:48px; }
  .top { display:flex; align-items:center; gap:18px; }
  .top img { width:84px; height:84px; border-radius:20px; }
  .top span { font-size:32px; font-weight:700; color:#047857; }
  h1 { font-size:128px; font-weight:800; line-height:1.0; letter-spacing:-0.02em; }
  .cards { display:flex; flex-direction:column; gap:32px; flex:1; margin-top:24px; }
  .card { background:#fff; border:2px solid #E7E5E4; border-radius:32px; padding:40px 48px; display:flex; align-items:center; gap:32px; }
  .num { font-size:64px; font-weight:800; color:#047857; min-width:90px; }
  .body { display:flex; flex-direction:column; gap:6px; }
  .title { font-size:44px; font-weight:700; line-height:1.1; }
  .benefit { font-size:32px; color:#047857; font-weight:600; }
  .foot { text-align:center; font-size:36px; font-weight:700; color:#047857; }
</style>
</head>
<body>
  <div class="stage">
    <div class="top"><img src="../../personal/avatars/avatar-eB-cream-512.png"><span>ebecerra.es</span></div>
    <h1>Lo que<br>hago.</h1>
    <div class="cards">
      <div class="card"><div class="num">01</div><div class="body"><div class="title">Web profesional</div><div class="benefit">Para empezar bien</div></div></div>
      <div class="card"><div class="num">02</div><div class="body"><div class="title">Web editable</div><div class="benefit">Tú la actualizas</div></div></div>
      <div class="card"><div class="num">03</div><div class="body"><div class="title">Rescate web</div><div class="benefit">Arregla la que ya tienes</div></div></div>
      <div class="card"><div class="num">04</div><div class="body"><div class="title">Mantenimiento</div><div class="benefit">Mantenla a punto</div></div></div>
    </div>
    <div class="foot">Detalles en ebecerra.es 👇</div>
  </div>
</body>
</html>
