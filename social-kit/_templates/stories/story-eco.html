<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../carruseles/4-demos/_base.css" />
<style>
  html, body { width: 1080px; height: 1920px; }
  .story {
    width: 1080px; height: 1920px;
    background: var(--cream);
    color: var(--ink);
    padding: 220px 80px 140px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .top-band {
    position: absolute; top: 0; left: 0; right: 0;
    height: 140px; background: var(--green);
    display: flex; align-items: center;
    padding: 0 80px;
    color: var(--cream);
    font-weight: 700;
    letter-spacing: 0.06em;
    font-size: 22px;
    text-transform: uppercase;
  }
  .top-band__dot {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--cream); color: var(--green);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px; margin-right: 16px;
  }

  .kicker { font-size: 22px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
  h1 {
    font-size: 132px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin-bottom: 24px;
  }
  h1 em { font-style: normal; color: var(--green); }
  .sub {
    font-size: 30px;
    line-height: 1.35;
    color: var(--muted);
    margin-bottom: 56px;
    max-width: 850px;
    font-weight: 500;
  }

  .shot {
    margin-top: 16px;
    border: 3px solid var(--ink);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 16px 16px 0 var(--green);
    background: #fff;
    max-width: 100%;
  }
  .shot img { display: block; width: 100%; height: auto; }

  .cta {
    position: absolute;
    bottom: 100px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cta__text {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
  }
  .cta__url {
    background: var(--green);
    color: var(--cream);
    padding: 16px 32px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 22px;
  }
</style>
</head>
<body>
  <div class="story">
    <div class="top-band">
      <span class="top-band__dot">eB</span> demo nueva ✦
    </div>

    <p class="kicker">// agencia de marketing</p>
    <h1>eco.</h1>
    <p class="sub">Una web con personalidad para gente que vende otras webs.</p>

    <div class="shot">
      <img src="../../personal/captures/demo-eco-desktop.png" alt="" />
    </div>

    <div class="cta">
      <span class="cta__text">Mírala completa →</span>
      <span class="cta__url">ebecerra.es/ejemplos</span>
    </div>
  </div>
</body>
</html>
