<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../carruseles/4-demos/_base.css" />
<style>
  html, body { width: 2048px; height: 1080px; overflow: hidden; }
  .cover {
    width: 2048px; height: 1080px;
    background: var(--green);
    color: var(--cream);
    position: relative;
    overflow: hidden;
    padding: 100px 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .blob1, .blob2 { position: absolute; border-radius: 50%; pointer-events: none; }
  .blob1 { width: 720px; height: 720px; background: var(--green-deeper); top: -240px; right: -180px; opacity: 0.55; }
  .blob2 { width: 460px; height: 460px; background: var(--coral); bottom: -160px; left: 8%; opacity: 0.18; }

  .kicker {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.85;
    margin-bottom: 36px;
  }
  .kicker__dot {
    width: 12px; height: 12px; border-radius: 50%; background: #FFE4B5;
  }

  h1 {
    font-size: 168px;
    line-height: 0.92;
    letter-spacing: -0.045em;
    font-weight: 900;
    max-width: 1500px;
    margin: 0 0 32px;
    color: var(--cream);
  }
  h1 em {
    font-style: normal;
    color: #FFE4B5;
    font-weight: 900;
  }

  .lead {
    font-size: 34px;
    line-height: 1.3;
    font-weight: 500;
    max-width: 1100px;
    opacity: 0.92;
  }

  .brand {
    position: absolute;
    bottom: 80px;
    right: 140px;
    display: inline-flex;
    align-items: center;
    gap: 18px;
    font-size: 30px;
    font-weight: 700;
    color: var(--cream);
  }
  .brand__dot {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--cream); color: var(--green);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 24px; letter-spacing: -0.02em;
  }
</style>
</head>
<body>
  <div class="cover">
    <span class="blob1"></span>
    <span class="blob2"></span>

    <p class="kicker"><span class="kicker__dot"></span> Madrid · Toda España</p>
    <h1>Webs a medida<br/>para <em>PYMEs</em><br/>y autónomos.</h1>
    <p class="lead">Sin plantillas. Sin agencias. Sin permanencias.</p>

    <span class="brand">
      <span class="brand__dot">eB</span> ebecerra.es
    </span>
  </div>
</body>
</html>
