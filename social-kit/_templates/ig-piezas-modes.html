<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1080px; overflow:hidden; font-family:'Inter',sans-serif; background:#F7F2E8; color:#3A2A1C; }
  .stage { width:1080px; height:1080px; padding:80px 72px; display:flex; flex-direction:column; gap:40px; }
  .top { display:flex; align-items:center; gap:20px; }
  .top img { width:80px; height:80px; }
  .top span { font-family:'Cormorant Garamond',serif; font-size:48px; font-weight:700; }
  h1 { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:88px; line-height:1.0; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:28px; flex:1; }
  .card { background:#fff; border:1px solid #E5DAC5; border-radius:32px; padding:44px; display:flex; flex-direction:column; gap:16px; }
  .icon { width:80px; height:80px; border-radius:20px; background:#CF871B; display:flex; align-items:center; justify-content:center; color:#fff; font-size:42px; font-weight:700; }
  .title { font-size:40px; font-weight:700; }
  .desc { font-size:26px; line-height:1.4; opacity:.75; }
  .foot { text-align:center; font-size:30px; font-weight:600; opacity:.7; }
</style>
</head>
<body>
  <div class="stage">
    <div class="top"><img src="../piezas/logos/piezas-icon-512.png"><span>Piezas</span></div>
    <h1>Cuatro maneras<br>de jugar.</h1>
    <div class="grid">
      <div class="card"><div class="icon">📅</div><div class="title">Puzzle del día</div><div class="desc">Uno nuevo cada día. Ranking diario.</div></div>
      <div class="card"><div class="icon">🗓️</div><div class="title">Calendario</div><div class="desc">30 días, 30 puzzles. Tu racha cuenta.</div></div>
      <div class="card"><div class="icon">⏱️</div><div class="title">Contrarreloj</div><div class="desc">100 niveles. La presión hace afición.</div></div>
      <div class="card"><div class="icon">🌀</div><div class="title">Piezas Locas</div><div class="desc">Piezas que rotan. Para los valientes.</div></div>
    </div>
    <div class="foot">ebecerra.es/piezas-game</div>
  </div>
</body>
</html>
