<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  /* Mockup de notificación de email (estilo bandeja entrante) */
  .visual__notif {
    width: 600px;
    background: #fff;
    border: 5px solid var(--ink);
    border-radius: 22px;
    box-shadow: 16px 16px 0 var(--green);
    overflow: hidden;
  }
  .visual__notif__header {
    background: #F3F4F6;
    padding: 20px 28px;
    border-bottom: 3px solid var(--ink);
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .visual__notif__header__icon {
    width: 36px; height: 36px;
    background: var(--green);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .visual__notif__header__icon svg {
    width: 22px; height: 22px;
    stroke: var(--cream);
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .visual__notif__header__badge {
    margin-left: auto;
    background: var(--coral);
    color: var(--cream);
    font-size: 18px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 999px;
  }
  .visual__notif__msg {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .visual__notif__msg__from {
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .visual__notif__msg__time {
    color: var(--muted);
    font-weight: 600;
    font-size: 18px;
    margin-left: 12px;
  }
  .visual__notif__msg__subject {
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .visual__notif__msg__preview {
    font-size: 20px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.35;
    margin-top: 4px;
  }
  .visual__notif__msg__preview em {
    font-style: normal;
    color: var(--green);
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="slide slide--cream">
    <div class="tag"><span class="tag__num">03</span> formulario</div>
    <div class="page-num">04 / 07</div>

    <div style="margin-top: 36px;">
      <div class="big">Si su mensaje<br/>te <em>llega</em>.</div>
      <div class="lead">Muchos se pierden por el camino.<br/>El cliente cree que pasaste de él.</div>
    </div>

    <div class="visual">
      <div class="visual__notif">
        <div class="visual__notif__header">
          <span class="visual__notif__header__icon">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="6" width="18" height="12" rx="2"/>
              <path d="M3 8 L12 14 L21 8"/>
            </svg>
          </span>
          <span>Bandeja entrada</span>
          <span class="visual__notif__header__badge">+ 1</span>
        </div>
        <div class="visual__notif__msg">
          <div>
            <span class="visual__notif__msg__from">Pepe Martínez</span>
            <span class="visual__notif__msg__time">hace 2 min</span>
          </div>
          <div class="visual__notif__msg__subject">Cita el lunes</div>
          <div class="visual__notif__msg__preview">Hola, vi tu web y quería pedir una cita para el lunes por la tarde. ¿Tienes hueco a las 17 h? <em>Llega.</em></div>
        </div>
      </div>
    </div>

    <div class="brand-mark"><span class="brand-mark__dot">eB</span> @ebecerra.dev</div>
    <div class="swipe">→</div>
  </div>
</body>
</html>
