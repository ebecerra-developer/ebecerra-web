<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  .cta-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
  }
  .cta-block .big {
    font-size: 130px;
    line-height: 0.92;
  }
  .cta-block .lead {
    margin-top: 40px;
    font-size: 38px;
  }
  .cta-handle {
    margin-top: 64px;
    display: inline-block;
    background: var(--cream);
    color: var(--green);
    font-size: 48px;
    font-weight: 800;
    padding: 22px 42px;
    border-radius: 999px;
  }
  .cta-extra {
    margin-top: 28px;
    font-size: 26px;
    font-weight: 600;
    opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="slide slide--green">
    <div class="kicker">¿la miramos juntos?</div>
    <div class="page-num">07 / 07</div>

    <div class="cta-block">
      <div class="big">Te lo <em>miro</em>.<br/>Sin compromiso.</div>
      <div class="lead">DM con la URL de tu web<br/>y te digo en 24 h cómo está.</div>
      <div class="cta-handle">@ebecerra.dev</div>
      <div class="cta-extra">o ebecerra.es</div>
    </div>

    <div class="brand-mark"><span class="brand-mark__dot">eB</span> @ebecerra.dev</div>
  </div>
</body>
</html>
