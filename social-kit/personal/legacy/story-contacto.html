<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1920px; overflow:hidden; font-family:'Inter',sans-serif; }
  .stage {
    width:1080px; height:1920px;
    background: linear-gradient(160deg, #047857 0%, #065F46 60%, #064E3B 100%);
    color:#FAFAF9;
    padding:140px 100px;
    display:flex; flex-direction:column; justify-content:space-between;
    position:relative; overflow:hidden;
  }
  .stage::after { content:""; position:absolute; right:-200px; top:-200px; width:700px; height:700px; border-radius:50%; background:rgba(255,255,255,0.05); }
  .stage::before { content:""; position:absolute; left:-200px; bottom:-200px; width:700px; height:700px; border-radius:50%; background:rgba(255,255,255,0.04); }
  .top { display:flex; align-items:center; gap:18px; position:relative; }
  .top img { width:100px; height:100px; border-radius:24px; box-shadow:0 8px 24px rgba(0,0,0,0.18); }
  .top span { font-size:34px; font-weight:700; }
  .middle { position:relative; }
  h1 { font-size:168px; font-weight:800; line-height:0.95; letter-spacing:-0.04em; }
  .lead { font-size:38px; opacity:.85; margin-top:36px; max-width:780px; line-height:1.3; }
  .channels { display:flex; flex-direction:column; gap:32px; position:relative; margin-bottom:40px; }
  .channel { display:flex; align-items:center; gap:24px; font-size:36px; font-weight:600; }
  .channel .icon { width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; font-size:36px; flex-shrink:0; }
</style>
</head>
<body>
  <div class="stage">
    <div class="top"><img src="../../personal/avatars/avatar-eB-cream-512.png"><span>ebecerra.es</span></div>
    <div class="middle">
      <h1>¿Hablamos?</h1>
      <p class="lead">Cuéntame qué necesitas — sin compromiso. La primera conversación es gratis y nos sirve para ver si encaja.</p>
    </div>
    <div class="channels">
      <div class="channel"><span class="icon">💬</span><span>Mensaje directo aquí</span></div>
      <div class="channel"><span class="icon">📩</span><span>e.becerra@ebecerra.es</span></div>
      <div class="channel"><span class="icon">🌐</span><span>ebecerra.es</span></div>
    </div>
  </div>
</body>
</html>
