<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Extract</title></head>
<body style="margin:0;background:#888;">
<canvas id="c" width="512" height="512"></canvas>
<script>
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, 512, 512);
    const data = ctx.getImageData(0, 0, 512, 512);
    const px = data.data;
    // Source: green BG #047857 + white eB shape.
    // Target: transparent BG + white eB shape (with anti-aliasing preserved).
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], g = px[i+1], b = px[i+2];
      const lum = 0.2126*r + 0.7152*g + 0.0722*b;
      // Use luminance as alpha: lum 0..255 -> alpha 0..255
      // Linear blend between green (lum~80) and white (lum~255).
      // Anything bright = visible white; dark = transparent.
      // Threshold + smooth ramp:
      let a;
      if (lum < 140) a = 0;
      else if (lum > 230) a = 255;
      else a = Math.round((lum - 140) / (230 - 140) * 255);
      px[i] = 255; px[i+1] = 255; px[i+2] = 255; px[i+3] = a;
    }
    ctx.putImageData(data, 0, 0);
    window.__white = c.toDataURL('image/png');
    document.title = 'READY';
  };
  img.src = '../personal/avatars/avatar-eB-green-512.png';
</script>
</body></html>
