<!doctype html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .wire { width: 904px; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 40px 0; }
  .wblk { width: 560px; background: #fff; border: 2px solid rgba(31,24,16,.12); border-radius: 16px;
    padding: 22px 28px; font-size: 30px; font-weight: 700; color: var(--muted); text-align: center;
    box-shadow: 0 8px 20px -12px rgba(31,24,16,.25); }
  .wblk--hero { font-size: 33px; color: var(--ink); }
  .warr { font-size: 34px; color: var(--green); font-weight: 900; line-height: 1; opacity: .8; }
  .wblk--goal { background: var(--green); color: var(--cream); border-color: var(--green); font-size: 34px; font-weight: 900;
    box-shadow: 0 16px 34px -14px rgba(2,88,60,.6); }
</style>
</head>
<body>
  <div class="slide slide--cream">
    <div class="page-num">07 / 08</div>
    <div class="anat">
      <div class="wire">
        <div class="wblk wblk--hero">Qué haces y para quién</div>
        <div class="warr">↓</div>
        <div class="wblk">Servicios</div>
        <div class="warr">↓</div>
        <div class="wblk">Opiniones</div>
        <div class="warr">↓</div>
        <div class="wblk wblk--goal">Contacto ✓</div>
      </div>
      <div class="txt">
        <div class="step__tag"><span class="step__num">6</span><span class="step__label">El recorrido</span></div>
        <div class="step__title">Todo lleva al mismo sitio</div>
        <div class="step__body">Cada sección empuja, sin distracciones, hacia un único objetivo: que te escriban.</div>
      </div>
    </div>
    <div class="brand-mark"><span class="brand-mark__dot">eB</span>@ebecerra.es</div>
  </div>
</body></html>
