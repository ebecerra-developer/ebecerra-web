<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
<style>
  /* Story teaser: guiño al post del CERN (21-jul) + pregunta para medir interés en
     una SERIE de curiosidades. Deja hueco abajo para el sticker de ENCUESTA nativo de IG. */
  :root{--green:#047857;--green-light:#6EE7B7;--cream:#FAF6EE;--ink:#0e2a1f}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1080px;height:1920px;overflow:hidden;font-family:"Inter","Segoe UI Emoji",sans-serif;-webkit-font-smoothing:antialiased}
  .stage{position:relative;width:1080px;height:1920px;overflow:hidden;padding:210px 90px 90px;display:flex;flex-direction:column;align-items:center;text-align:center;
    background:radial-gradient(120% 80% at 30% 16%,#058a63 0%,#047857 52%,#02583c 100%)}
  .chip{position:absolute;top:54px;left:54px;display:flex;align-items:center;gap:12px;background:rgba(2,40,26,.5);padding:11px 24px 11px 11px;border-radius:999px;font-weight:700;font-size:26px;color:var(--cream)}
  .chip .dot{width:40px;height:40px;border-radius:50%;background:var(--cream);color:var(--green);display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:18px}

  .kick{font-size:30px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--green-light);margin-bottom:48px}

  /* Tarjeta navegador (eco del post del CERN) */
  .win{width:100%;max-width:760px;background:var(--cream);border-radius:26px;overflow:hidden;box-shadow:0 34px 80px -30px rgba(2,16,10,.8);transform:rotate(-2deg)}
  .win .bar{display:flex;align-items:center;gap:14px;background:#e4ddcd;padding:20px 26px}
  .win .dots{display:flex;gap:9px}
  .win .dots i{width:16px;height:16px;border-radius:50%;background:#c3bBa6;display:block}
  .win .url{flex:1;display:flex;align-items:center;gap:12px;background:#fff;border-radius:999px;padding:12px 22px;font-size:27px;font-weight:600;color:#5b6b62}
  .win .url svg{width:24px;height:24px;flex-shrink:0}
  .win .body{padding:36px 40px 40px;text-align:left}
  .win .body .t{font-size:44px;font-weight:900;color:var(--ink);line-height:1.1;letter-spacing:-.02em}
  .win .body .d{margin-top:14px;font-size:31px;font-weight:600;color:#4c5b52;line-height:1.3}

  .q{margin-top:104px;font-size:60px;font-weight:900;line-height:1.1;letter-spacing:-.03em;color:var(--cream)}
  .q em{font-style:normal;color:var(--green-light)}
  .hint{margin-top:26px;font-size:34px;font-weight:600;color:rgba(250,246,238,.8);display:inline-flex;align-items:center;gap:12px}
  .hint svg{width:32px;height:32px;stroke:var(--green-light)}

  /* Zona para el sticker de encuesta nativo (no se dibuja nada solido: solo referencia) */
  .pollzone{margin-top:70px;width:560px;height:150px;border:3px dashed rgba(250,246,238,.35);border-radius:22px;display:flex;align-items:center;justify-content:center;color:rgba(250,246,238,.5);font-size:26px;font-weight:600}
</style>
</head>
<body>
  <div class="stage">
    <div class="chip"><span class="dot">eB</span>@ebecerra.es</div>

    <div class="kick">¿recordáis esta?</div>

    <div class="win">
      <div class="bar">
        <div class="dots"><i></i><i></i><i></i></div>
        <div class="url"><svg viewBox="0 0 24 24" fill="none" stroke="#047857" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>info.cern.ch</div>
      </div>
      <div class="body">
        <div class="t">La primera web de la historia sigue online</div>
        <div class="d">La publicó Tim Berners-Lee en el CERN en 1991. Y puedes visitarla hoy.</div>
      </div>
    </div>

    <div class="q">Me apetece hacer una <em>serie</em>:<br>curiosidades de webs e internet.</div>
    <div class="hint">¿Te gustaría? Vota <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg></div>

    <div class="pollzone">↓ sticker de encuesta (IG) ↓</div>
  </div>
</body>
</html>
