<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1080px; overflow:hidden; font-family:'Inter',sans-serif; }
  .stage {
    width:1080px; height:1080px;
    background: linear-gradient(135deg, #047857 0%, #065F46 100%);
    color:#FAFAF9;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:96px 80px;
    position:relative;
  }
  .logo { width:180px; height:180px; display:block; }
  .logo img { width:100%; height:100%; display:block; }
  h1 { font-size:104px; font-weight:800; line-height:1.05; letter-spacing:-0.03em; max-width:900px; }
  .sub { font-size:36px; font-weight:400; opacity:.9; max-width:880px; margin-top:24px; line-height:1.35; }
  .foot { display:flex; align-items:center; justify-content:space-between; }
  .url { font-size:32px; font-weight:600; letter-spacing:.04em; }
  .tag { font-size:24px; font-weight:600; opacity:.7; }
</style>
</head>
<body>
  <div class="stage">
    <div class="logo"><img src="../personal/avatars/avatar-eB-white-transparent-512.png"></div>
    <div>
      <h1>Hola, soy Enrique.</h1>
      <p class="sub">Hago webs y apps a mano para tu negocio. Sin plantillas, sin intermediarios.</p>
    </div>
    <div class="foot">
      <span class="url">ebecerra.es</span>
      <span class="tag">#desarrolloweb #autonomos</span>
    </div>
  </div>
</body>
</html>
