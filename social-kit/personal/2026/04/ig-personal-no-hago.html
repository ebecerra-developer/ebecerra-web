<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1080px; overflow:hidden; font-family:'Inter',sans-serif; }
  .stage {
    width:1080px; height:1080px;
    background: linear-gradient(135deg, #047857 0%, #065F46 100%);
    color:#FAFAF9;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:80px 80px 88px;
    position:relative;
  }
  .head { display:flex; align-items:center; gap:18px; }
  .head .logo { width:120px; height:120px; border-radius:24px; overflow:hidden; box-shadow:0 6px 18px rgba(0,0,0,0.18); }
  .head .logo img { width:100%; height:100%; display:block; }
  h1 { font-size:120px; font-weight:800; line-height:0.95; letter-spacing:-0.03em; }
  h1 .small { display:block; font-size:48px; font-weight:600; opacity:.85; margin-bottom:8px; letter-spacing:-0.01em; }
  .list { display:flex; flex-direction:column; gap:24px; }
  .item { display:flex; align-items:flex-start; gap:24px; font-size:36px; font-weight:500; line-height:1.3; }
  .item .x {
    flex-shrink:0; width:52px; height:52px; border-radius:50%;
    background:rgba(255,255,255,0.14); display:flex; align-items:center; justify-content:center;
    margin-top:4px;
  }
  .item .x svg { width:28px; height:28px; stroke:#FAFAF9; stroke-width:2.5; fill:none; stroke-linecap:round; }
  .foot {
    display:flex; align-items:center; justify-content:space-between;
    font-size:28px; font-weight:600;
  }
  .foot .left { opacity:.85; }
  .foot .right { opacity:.6; }
</style>
</head>
<body>
  <div class="stage">
    <div class="head">
      <div class="logo"><img src="../personal/avatars/avatar-eB-cream-512.png"></div>
    </div>
    <h1><span class="small">Lo que</span>NO hago.</h1>
    <div class="list">
      <div class="item"><span class="x"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 18L18 6"/></svg></span>Atarte con contrato a años.</div>
      <div class="item"><span class="x"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 18L18 6"/></svg></span>Llamarte cada semana para venderte algo.</div>
      <div class="item"><span class="x"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 18L18 6"/></svg></span>Vender paquetes mágicos de SEO.</div>
      <div class="item"><span class="x"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 18L18 6"/></svg></span>Hablarte en técnico cuando no toca.</div>
      <div class="item"><span class="x"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 18L18 6"/></svg></span>Cobrar por cosas que no entiendes.</div>
    </div>
    <div class="foot">
      <span class="left">ebecerra.es</span>
      <span class="right">Solo tú y yo. Lo justo, lo claro.</span>
    </div>
  </div>
</body>
</html>
