<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" />
<style>
  :root {
    --green: #047857;
    --cream: #FAFAF9;
    --ink: #0A0A0A;
    --muted: #525252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  .stage {
    position: relative; width: 1080px; height: 1920px;
    background: var(--cream); overflow: hidden;
  }
  .stage::after {
    content: ""; position: absolute; inset: 0;
    pointer-events: none; opacity: 0.18;
    mix-blend-mode: multiply;
    background-image: radial-gradient(rgba(0,0,0,0.5) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 50;
  }

  .corner {
    position: absolute; top: 80px; left: 80px;
    display: flex; align-items: center; gap: 14px;
    color: var(--ink); font-weight: 800; font-size: 26px;
    z-index: 40;
  }
  .corner .dot {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--green); color: var(--cream);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900;
  }
  .corner--light { color: var(--cream); }
  .corner--light .dot { background: var(--cream); color: var(--green); }

  .scene { position: absolute; inset: 0; opacity: 0; padding: 240px 80px 200px; }
  .scene--green { background: var(--green); color: var(--cream); }

  #s1 { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 0; }
  .acronym {
    font-size: 360px; font-weight: 900;
    letter-spacing: -0.05em; line-height: 1; color: var(--green);
  }
  .acronym__sub {
    margin-top: 40px; font-size: 36px;
    font-weight: 700; color: var(--muted);
    letter-spacing: -0.01em;
  }

  #s2, #s3 { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding-top: 0; }
  #s2 .big, #s3 .big {
    font-size: 130px; font-weight: 900;
    letter-spacing: -0.04em; line-height: 0.95;
    color: var(--ink);
  }
  #s2 .big em, #s3 .big em { font-style: normal; color: var(--green); }

  #s4 {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding-top: 0;
  }
  #s4 .big {
    font-size: 130px; font-weight: 900;
    letter-spacing: -0.045em; line-height: 0.92;
  }
  #s4 .big em { font-style: normal; color: #6EE7B7; }
  #s4 .handle {
    margin-top: 60px;
    font-size: 56px; font-weight: 800;
    background: var(--cream); color: var(--green);
    padding: 22px 42px; border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="corner"><span class="dot">eB</span> glosario</div>

    <div class="scene" id="s1">
      <div class="acronym">SEO</div>
      <div class="acronym__sub">(Es que Google te encuentre)</div>
    </div>

    <div class="scene" id="s2">
      <div class="big">Sin <em>SEO</em>,<br/>tu web está<br/>en una calle<br/>vacía.</div>
    </div>

    <div class="scene" id="s3">
      <div class="big">Con <em>SEO</em>,<br/>está donde<br/>te buscan.</div>
    </div>

    <div class="scene scene--green" id="s4">
      <div class="corner corner--light"><span class="dot">eB</span> glosario</div>
      <div class="big">Lo <em>monto</em><br/>en cada web.</div>
      <div class="handle">@ebecerra.es</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ defaults: { ease: "power3.out" }, paused: true });
    const FADE_OUT = { immediateRender: false };
    window.__tl = tl;
    window.__startAnim = () => tl.play(0);

    // S1 visible desde t=0 (thumbnail safe)
    gsap.set("#s1", { opacity: 1 });
    gsap.set(".acronym", { scale: 1, opacity: 1 });
    gsap.set(".acronym__sub", { y: 0, opacity: 1 });
    tl.fromTo("#s1", { opacity: 1 }, { opacity: 0, duration: 0.5, ...FADE_OUT }, 2.6);

    // S2 (2.8 → 5.6s)
    tl.fromTo("#s2", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 2.8);
    tl.fromTo("#s2 .big", { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.95 }, 3.0);
    tl.fromTo("#s2", { opacity: 1 }, { opacity: 0, duration: 0.45, ...FADE_OUT }, 5.4);

    // S3 (5.6 → 8.4s)
    tl.fromTo("#s3", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 5.6);
    tl.fromTo("#s3 .big", { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.95 }, 5.8);
    tl.fromTo("#s3", { opacity: 1 }, { opacity: 0, duration: 0.45, ...FADE_OUT }, 8.2);

    // S4 (8.4 → 11s)
    tl.fromTo("#s4", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 8.4);
    tl.fromTo("#s4 .big", { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.85 }, 8.6);
    tl.fromTo("#s4 .handle", { scale: 0.7, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6 }, 9.4);
  </script>
</body>
</html>
