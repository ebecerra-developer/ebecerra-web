<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@500;700;800;900&display=swap" />
<style>
  /* Paleta eB (marca) — solo brand corner */
  :root {
    --green: #047857;
    --cream: #FAFAF9;
  }
  /* Paleta equilibrio fisio — el resto del frame */
  :root {
    --eq-bg: #f7f0e3;
    --eq-bg-deep: #ede1cb;
    --eq-surface: #ffffff;
    --eq-ink: #2a1f12;
    --eq-text: #2a1f12;
    --eq-muted: #6d573c;
    --eq-cta: #1e5f6e;
    --eq-accent: #b86a44;
    --eq-border: #e0cfaf;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1920px;
    background: var(--eq-bg);
    font-family: "DM Sans", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    position: relative;
    width: 1080px; height: 1920px;
    background: var(--eq-bg);
    overflow: hidden;
  }
  .stage::after {
    content: ""; position: absolute; inset: 0;
    pointer-events: none; opacity: 0.14;
    mix-blend-mode: multiply;
    background-image: radial-gradient(rgba(42,31,18,0.5) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 50;
  }

  .eb-corner {
    position: absolute; top: 64px; left: 72px;
    display: flex; align-items: center; gap: 14px;
    z-index: 40;
    font-family: "Inter", sans-serif;
    color: var(--eq-text);
    font-weight: 800; font-size: 26px;
  }
  .eb-corner .dot {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--green); color: var(--cream);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900;
  }

  /* Zona del link sticker (arriba) */
  .sticker-hint {
    position: absolute;
    top: 200px; left: 0; right: 0;
    text-align: center;
    z-index: 30;
  }
  .sticker-hint .arrow {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-size: 38px;
    color: var(--eq-muted);
    letter-spacing: -0.01em;
  }
  .sticker-hint .label {
    display: block;
    margin-top: 4px;
    font-family: "DM Sans", sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--eq-muted);
  }

  /* Headline */
  .head {
    position: absolute;
    top: 360px;
    left: 88px; right: 88px;
    text-align: center;
    z-index: 20;
  }
  .head .kicker {
    font-family: "DM Sans", sans-serif;
    font-size: 26px; font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--eq-cta);
    margin-bottom: 22px;
  }
  .head h1 {
    font-family: "Fraunces", Georgia, serif;
    font-size: 110px; font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 0.96;
    color: var(--eq-text);
  }
  .head h1 em {
    font-style: italic;
    color: var(--eq-cta);
  }

  /* Step caption (debajo del headline, va cambiando con el frame) */
  .step-caption {
    position: absolute;
    top: 740px;
    left: 0; right: 0;
    text-align: center;
    z-index: 22;
    font-family: "DM Sans", sans-serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--eq-muted);
    letter-spacing: -0.005em;
    /* Container holds 6 children; only one visible at a time via GSAP */
    height: 44px;
  }
  .step-caption span {
    position: absolute;
    top: 0; left: 0; right: 0;
    opacity: 0;
  }
  .step-caption strong { color: var(--eq-text); font-weight: 700; }
  .step-caption em {
    font-style: italic;
    color: var(--eq-cta);
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
  }
  .step-caption .check {
    display: inline-block;
    width: 28px; height: 28px;
    margin-right: 10px;
    vertical-align: -5px;
    border-radius: 50%;
    background: var(--eq-cta);
    color: #fff;
    text-align: center;
    line-height: 28px;
    font-size: 18px;
    font-weight: 900;
  }

  /* Phone mockup */
  .phone-wrap {
    position: absolute;
    top: 820px;
    left: 50%;
    transform: translateX(-50%) rotate(-1.5deg);
    z-index: 18;
  }
  .phone {
    width: 420px;
    aspect-ratio: 9 / 19.5;
    background: var(--eq-ink);
    border-radius: 48px;
    padding: 12px;
    box-shadow:
      0 36px 80px rgba(42,31,18,0.28),
      0 12px 24px rgba(42,31,18,0.18);
    position: relative;
  }
  .phone::before {
    content: "";
    position: absolute;
    top: 22px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 24px;
    background: #000;
    border-radius: 14px;
    z-index: 10;
  }
  .phone__screen {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 38px;
    overflow: hidden;
    background: var(--eq-bg);
  }
  .phone__screen img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
    opacity: 0;
    will-change: opacity, transform;
  }
  /* Frame 3 = same source as frame 2 con zoom in para "focus en cards" */
  .phone__screen #f3 {
    transform-origin: 50% 65%;
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 80px;
    left: 0; right: 0;
    text-align: center;
    z-index: 20;
  }
  .footer .handle {
    display: inline-block;
    background: var(--eq-ink);
    color: var(--eq-bg);
    font-family: "Inter", sans-serif;
    font-size: 38px; font-weight: 800;
    padding: 18px 36px;
    border-radius: 999px;
    letter-spacing: -0.005em;
  }
  .footer .url {
    margin-top: 22px;
    font-family: "DM Sans", sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--eq-muted);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="eb-corner"><span class="dot">eB</span> reservas</div>

    <div class="sticker-hint">
      <span class="arrow">↑ aquí va el sticker ↑</span>
      <span class="label">toca para reservar</span>
    </div>

    <div class="head">
      <div class="kicker">funciona · pruébalo</div>
      <h1>Pide cita<br/><em>online</em>.</h1>
    </div>

    <div class="step-caption">
      <span id="c1">Demo · <strong>Equilibrio Fisioterapia</strong></span>
      <span id="c2">Sección <strong>Reserva online</strong></span>
      <span id="c3"><em>1.</em> Elige un servicio</span>
      <span id="c4"><em>2.</em> Elige el día</span>
      <span id="c5"><em>3.</em> Elige la hora</span>
      <span id="c6"><span class="check">✓</span><strong>Cita solicitada</strong></span>
    </div>

    <div class="phone-wrap" id="phone">
      <div class="phone">
        <div class="phone__screen">
          <img id="f1" src="../../../assets/captures/demo-equilibrio-mobile.png" alt="" />
          <img id="f2" src="../../../assets/captures/demo-equilibrio-booking-step1-servicios.png" alt="" />
          <img id="f3" src="../../../assets/captures/demo-equilibrio-booking-step1-servicios.png" alt="" />
          <img id="f4" src="../../../assets/captures/demo-equilibrio-booking-step2-dia.png" alt="" />
          <img id="f5" src="../../../assets/captures/demo-equilibrio-booking-widget.png" alt="" />
          <img id="f6" src="../../../assets/captures/demo-equilibrio-booking-step6-solicitada.png" alt="" />
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="handle">@ebecerra.es</div>
      <div class="url">demos.ebecerra.es/equilibrio</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    // Defaults: immediateRender true para evitar flicker en seek bidireccional.
    // FADE_OUT spread para tweens "to 0" donde queremos no aplicar el estado final
    // antes de tiempo (no es crítico aquí pero mantengo el patrón canónico).
    gsap.defaults({ immediateRender: true });
    const FADE_OUT = { immediateRender: false };

    // Estado inicial: solo f1 visible (cumple gotcha #4 del SKILL — first frame
    // del MP4 = thumbnail del grid IG, debe ser visible desde t=0).
    gsap.set("#f1", { opacity: 1 });
    gsap.set("#f3", { scale: 1.15, transformOrigin: "50% 70%" });
    gsap.set("#c1", { opacity: 1 });

    const tl = gsap.timeline({ paused: true });
    window.__tl = tl;

    // ── INTRO (0 → 0.8s) ────────────────────────────────────────────
    tl.fromTo("#stage", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
    tl.fromTo("#phone",
      { y: 40, scale: 0.96 },
      { y: 0, scale: 1, duration: 0.8, ease: "power3.out" }, 0.1);

    // ── FRAME 1 — Portada (0.8 → 2.8s visible) ──────────────────────
    // f1 ya está visible desde gsap.set inicial

    // ── FRAME 2 — Sección de reserva (crossfade @ 2.8s) ─────────────
    tl.fromTo("#f2", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.inOut" }, 2.8);
    tl.to("#f1", { ...FADE_OUT, opacity: 0, duration: 0.5, ease: "power1.inOut" }, 2.8);
    tl.fromTo("#c2", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 2.9);
    tl.to("#c1", { ...FADE_OUT, opacity: 0, duration: 0.4 }, 2.9);

    // ── FRAME 3 — Elegir servicio (crossfade @ 4.8s, zoom in continuo) ─
    tl.fromTo("#f3", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.inOut" }, 4.8);
    tl.to("#f2", { ...FADE_OUT, opacity: 0, duration: 0.5, ease: "power1.inOut" }, 4.8);
    tl.fromTo("#c3", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 4.9);
    tl.to("#c2", { ...FADE_OUT, opacity: 0, duration: 0.4 }, 4.9);
    // Ken-burns: zoom continuo durante toda la visibilidad de f3
    tl.to("#f3", { scale: 1.28, duration: 2, ease: "power1.inOut" }, 4.8);

    // ── FRAME 4 — Día (crossfade @ 6.8s) ─────────────────────────────
    tl.fromTo("#f4", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.inOut" }, 6.8);
    tl.to("#f3", { ...FADE_OUT, opacity: 0, duration: 0.5, ease: "power1.inOut" }, 6.8);
    tl.fromTo("#c4", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 6.9);
    tl.to("#c3", { ...FADE_OUT, opacity: 0, duration: 0.4 }, 6.9);

    // ── FRAME 5 — Hora (crossfade @ 8.8s) ────────────────────────────
    tl.fromTo("#f5", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.inOut" }, 8.8);
    tl.to("#f4", { ...FADE_OUT, opacity: 0, duration: 0.5, ease: "power1.inOut" }, 8.8);
    tl.fromTo("#c5", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 8.9);
    tl.to("#c4", { ...FADE_OUT, opacity: 0, duration: 0.4 }, 8.9);

    // ── FRAME 6 — Cita solicitada (crossfade @ 10.8s, hold largo) ────
    tl.fromTo("#f6", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.inOut" }, 10.8);
    tl.to("#f5", { ...FADE_OUT, opacity: 0, duration: 0.5, ease: "power1.inOut" }, 10.8);
    tl.fromTo("#c6", { opacity: 0, scale: 0.92 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 11.0);
    tl.to("#c5", { ...FADE_OUT, opacity: 0, duration: 0.4 }, 10.9);
    // Micro-zoom sutil en el frame 6 durante el hold (sin estridencia)
    tl.fromTo("#f6", { scale: 1, transformOrigin: "center" }, { scale: 1.035, duration: 3, ease: "power1.out" }, 11.3);

    // Hold 12s → 15s (timeline duration > anim end = held final state, gotcha #9)
    tl.to({}, { duration: 3 }, 12);
  </script>
</body>
</html>
