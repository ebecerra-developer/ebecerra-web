<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@600;700;800;900&display=swap" />
<style>
  /* Post 31-may "hago webs y también monté Piezas"
     1080×1350 (4:5 IG 2025) — paleta @ebecerra.es dominante (verde+cream)
     con captura real del juego en mockup teléfono a la derecha (cream+ámbar
     contrastando con el verde) para "se ven las dos cosas a la vez". */
  :root {
    --green:       #047857;
    --green-deep:  #024d33;
    --green-light: #6EE7B7;
    --cream:       #FAF6EE;
    --cream-soft:  #ECE3D0;
    --amber:       #D49758;   /* guiño del juego */
    --walnut:      #2a1f12;
    --ink:         #0A0A0A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1350px;
    overflow: hidden; background: #000;
    font-family: "DM Sans", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .post {
    position: relative;
    width: 1080px; height: 1350px;
    background: radial-gradient(125% 100% at 25% 22%, #058a63 0%, #047857 50%, #02583c 100%);
    overflow: hidden;
  }
  /* Grano sutil */
  .post::after {
    content: ""; position: absolute; inset: 0; z-index: 20;
    pointer-events: none; opacity: 0.06; mix-blend-mode: multiply;
    background-image: radial-gradient(rgba(0,0,0,0.6) 1px, transparent 1px);
    background-size: 4px 4px;
  }

  /* Brand corner top-left */
  .brand {
    position: absolute; z-index: 14;
    left: 80px; top: 72px;
    display: flex; align-items: center; gap: 16px;
    font-family: "Inter", sans-serif;
    color: var(--cream);
    font-weight: 700; font-size: 32px;
    letter-spacing: -0.005em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  .brand .dot {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--cream); color: var(--green);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 900;
  }

  /* Lead — texto izquierda */
  .lead {
    position: absolute; z-index: 12;
    left: 80px; top: 140px;
    width: 480px;
    font-family: "Fraunces", Georgia, serif;
    color: var(--cream);
  }
  .lead .l1 {
    font-size: 64px; font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1;
    opacity: 0.85;
    margin-bottom: 14px;
  }
  .lead .l2 {
    font-size: 90px; font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 0.96;
  }
  .lead .l2 em {
    font-style: italic;
    color: var(--amber);
    font-weight: 600;
  }
  .lead .sub {
    margin-top: 26px;
    font-family: "DM Sans", sans-serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--cream);
    opacity: 0.78;
    line-height: 1.35;
  }
  /* Fila icono app + badge Google Play */
  .lead .store-row {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    margin-top: 24px;
  }
  .lead .app-icon {
    width: 74px; height: 74px;
    border-radius: 18px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.4);
  }
  /* Badge "Disponible en Google Play" */
  .lead .badge {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 14px 28px 14px 20px;
    background: var(--cream);
    color: var(--walnut);
    border-radius: 999px;
    box-shadow: 0 10px 26px rgba(2,40,26,0.32);
  }
  .lead .badge .gp-icon { width: 30px; height: 33px; flex-shrink: 0; }
  .lead .badge .bg-txt {
    display: flex; flex-direction: column;
    font-family: "Inter", sans-serif;
    line-height: 1.05;
  }
  .lead .badge .bg-txt small {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.7;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .lead .badge .bg-txt span {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  /* Destellos / brillos (sparkles) — mismo patrón que el tríptico */
  .spark { position: absolute; z-index: 11; pointer-events: none; }
  .spark--a { left: 540px; top: 220px; width: 70px; }
  .spark--b { left: 60px; top: 870px; width: 56px; }
  .spark--c { right: 30px; top: 380px; width: 50px; }
  .spark--d { right: 380px; top: 1180px; width: 44px; }

  /* Mockup teléfono con captura del juego (derecha) */
  .phone-wrap {
    position: absolute; z-index: 10;
    right: 60px; top: 440px;
    transform: rotate(3deg);
  }
  .phone {
    width: 380px;
    aspect-ratio: 9 / 19.5;
    background: var(--walnut);
    border-radius: 46px;
    padding: 11px;
    box-shadow:
      0 40px 80px rgba(2,40,26,0.55),
      0 12px 24px rgba(2,40,26,0.4);
    position: relative;
  }
  .phone::before {
    content: "";
    position: absolute;
    top: 22px; left: 50%;
    transform: translateX(-50%);
    width: 100px; height: 22px;
    background: #000;
    border-radius: 12px;
    z-index: 2;
  }
  .phone__screen {
    width: 100%; height: 100%;
    border-radius: 36px;
    overflow: hidden;
    background: var(--cream-soft);
  }
  .phone__screen img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  /* Body — explicación abajo, con separación visual respecto al lead */
  .body {
    position: absolute; z-index: 12;
    left: 80px; bottom: 280px;
    width: 480px;
    font-family: "Fraunces", Georgia, serif;
    font-size: 30px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--cream);
    opacity: 0.85;
  }
  .body strong { font-weight: 600; opacity: 1; }

  /* CTA + handle al pie */
  .cta {
    position: absolute; z-index: 12;
    left: 80px; bottom: 170px;
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-size: 38px;
    font-weight: 500;
    color: var(--cream);
  }
  .cta em {
    font-style: italic;
    color: var(--green-light);
  }
  .handle {
    position: absolute; z-index: 14;
    left: 80px; bottom: 80px;
    display: flex; align-items: center; gap: 14px;
    font-family: "Inter", sans-serif;
    font-size: 28px; font-weight: 700;
    color: var(--cream);
  }
  .handle .dot {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--cream); color: var(--green);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900;
  }
</style>
</head>
<body>
  <div class="post">

    <div class="lead">
      <div class="l1">Hago webs.</div>
      <div class="l2">Pero también<br/>creé <em>Piezas</em>.</div>
      <div class="sub">Un juego de puzzles. <br/>Puedes crear nuevos puzles con tus propias fotos.</div>
      <div class="store-row">
        <img class="app-icon" src="../../../../piezas-game/assets/logos/piezas-icon-512.png" alt="Icono Piezas" />
        <div class="badge">
        <svg class="gp-icon" viewBox="0 0 60 66" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gpGreen" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#00F076"/>
              <stop offset="1" stop-color="#00A472"/>
            </linearGradient>
            <linearGradient id="gpBlue" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#00C7E4"/>
              <stop offset="1" stop-color="#0066D9"/>
            </linearGradient>
            <linearGradient id="gpYellow" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#FFD400"/>
              <stop offset="1" stop-color="#FF8E00"/>
            </linearGradient>
            <linearGradient id="gpRed" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#FF3A44"/>
              <stop offset="1" stop-color="#C31162"/>
            </linearGradient>
          </defs>
          <polygon fill="url(#gpGreen)" points="4,2 30,33 4,33"/>
          <polygon fill="url(#gpBlue)" points="4,33 30,33 4,64"/>
          <polygon fill="url(#gpYellow)" points="4,2 56,33 30,33"/>
          <polygon fill="url(#gpRed)" points="30,33 56,33 4,64"/>
        </svg>
        <div class="bg-txt">
          <small>Disponible en</small>
          <span>Google Play</span>
        </div>
      </div>
      </div>
    </div>

    <div class="phone-wrap">
      <div class="phone">
        <div class="phone__screen">
          <img src="../../../../piezas-game/assets/captures/piezas-app-mobile-home.png" alt="Home de Piezas en móvil" />
        </div>
      </div>
    </div>

    <p class="body">Lo cuento porque a veces alguien tiene una app rondándole y cree que no es lo mío. <strong>Sí lo es.</strong></p>

    <div class="cta">Si te <em>sientes identificado</em>,<br/>escríbeme.</div>

    <div class="handle"><span class="dot">eB</span>@ebecerra.es</div>

    <!-- Destellos -->
    <svg class="spark spark--a" viewBox="0 0 100 100" fill="#FAF6EE"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
    <svg class="spark spark--b" viewBox="0 0 100 100" fill="#6EE7B7"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
    <svg class="spark spark--c" viewBox="0 0 100 100" fill="#D49758"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
    <svg class="spark spark--d" viewBox="0 0 100 100" fill="#FAF6EE"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>

  </div>
</body>
</html>
