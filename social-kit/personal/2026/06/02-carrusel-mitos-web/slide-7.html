<!doctype html>
<html lang="es">
<head>

<link rel="stylesheet" href="_base.css" />
<style>
  .close { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
  .close__title {
    font-weight: 900; font-size: 108px; line-height: 0.96;
    letter-spacing: -0.045em; color: var(--cream);
  }
  .close__title em { font-style: normal; color: var(--green-light); }
  .close__text {
    margin-top: 38px;
    font-size: 38px; font-weight: 500; line-height: 1.32;
    color: rgba(250,246,238,0.84); max-width: 760px;
  }
  .close__pill {
    margin-top: 56px;
    display: inline-block;
    background: var(--cream); color: var(--green);
    font-size: 46px; font-weight: 800;
    padding: 22px 44px; border-radius: 999px;
    box-shadow: 0 14px 30px rgba(2,40,26,0.34);
  }
</style>
</head>
<body>
  <div class="slide slide--green">
    <div class="kicker">¿te has visto en alguno?</div>

      <div class="close__text">Si te has visto en alguno de estos mitos, escríbeme y lo vemos juntos. Sin compromiso.</div>

    </div>

    <div class="brand-mark"><span class="brand-mark__dot">eB</span> ebecerra.es</div>

    <svg class="spark" style="left:720px;top:250px;width:58px;" viewBox="0 0 100 100" fill="#6EE7B7"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>

  </div>
