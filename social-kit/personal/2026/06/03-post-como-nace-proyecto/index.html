<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
<style>
  /* Post 2026-06-03 "Cómo nace un proyecto" · 1080×1350 (4:5)
     Personal. Inter + acento por color. Layout: título a todo el ancho arriba,
     foto izquierda + texto condensado derecha (sin solapes). */
  :root {
    --green:#047857; --green-deep:#024d33; --green-light:#6EE7B7;
    --cream:#FAF6EE; --cream-soft:#ECE3D0; --walnut:#2a1f12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1350px; overflow: hidden; background: #000;
    font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased;
  }
  .post {
    position: relative; width: 1080px; height: 1350px;
    background: radial-gradient(125% 100% at 26% 20%, #058a63 0%, #047857 50%, #02583c 100%);
    overflow: hidden;
  }
  .post::after {
    content: ""; position: absolute; inset: 0; z-index: 20;
    pointer-events: none; opacity: 0.06; mix-blend-mode: multiply;
    background-image: radial-gradient(rgba(0,0,0,0.6) 1px, transparent 1px);
    background-size: 4px 4px;
  }

  .logo {
    position: absolute; z-index: 14; left: 80px; top: 66px;
    height: 90px; width: auto;
  }

  .kicker {
    position: absolute; z-index: 12; left: 80px; top: 178px;
    font-size: 23px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--green-light);
  }

  .headline {
    position: absolute; z-index: 12; left: 80px; top: 228px; width: 920px;
    font-weight: 900; font-size: 78px; line-height: 1.0;
    letter-spacing: -0.045em; color: var(--cream);
  }
  .headline em { font-style: normal; color: var(--green-light); }

  /* Foto enmarcada (izquierda) */
  .photo-wrap { position: absolute; z-index: 10; left: 80px; top: 480px; transform: rotate(-2deg); }
  .photo {
    position: relative; width: 430px; height: 520px;
    background: var(--cream); padding: 14px; border-radius: 18px;
    box-shadow: 0 48px 70px -28px rgba(2,40,26,0.62);
  }
  .photo::before {
    content: ""; position: absolute; z-index: -1; inset: 0;
    border: 6px solid var(--green-light); border-radius: 18px;
    transform: translate(-18px, 22px); opacity: 0.85;
  }
  .photo img {
    width: 100%; height: 100%; object-fit: cover; object-position: center 20%;
    border-radius: 10px; display: block;
  }

  /* Columna de texto (derecha), condensada */
  .col { position: absolute; z-index: 12; left: 588px; top: 556px; width: 404px; }
  .body {
    font-size: 36px; font-weight: 500; line-height: 1.36; color: var(--cream); opacity: 0.92;
  }
  .body strong { font-weight: 700; color: var(--green-light); opacity: 1; }
  .cta {
    margin-top: 36px; font-weight: 800; font-size: 44px; line-height: 1.08;
    letter-spacing: -0.02em; color: var(--cream);
  }
  .cta em { font-style: normal; color: var(--green-light); }

  .handle {
    position: absolute; z-index: 14; left: 80px; bottom: 78px;
    font-size: 28px; font-weight: 700; color: var(--cream);
    letter-spacing: -0.01em; opacity: 0.92;
  }

  .spark { position: absolute; z-index: 11; pointer-events: none; }
</style>
</head>
<body>
  <div class="post">
    <img class="logo" src="../../../assets/avatars/logo-white.svg" alt="ebecerra.es" />

    <div class="kicker">cómo trabajo</div>
    <h1 class="headline">Antes de la web,<br/>una <em>conversación</em>.</h1>

    <div class="photo-wrap">
      <div class="photo">
        <img src="../../../assets/yo/enrique-retrato-sonriendo.jpg" alt="Enrique sonriendo" />
      </div>
    </div>

    <div class="col">
      <p class="body">Lo primero no es la web. Es <strong>entender tu negocio</strong>. De ahí sale todo.</p>
      <div class="cta">¿Tienes una idea?<br/>Te <em>escucho</em>.</div>
    </div>

    <div class="handle">@ebecerra.es</div>

    <svg class="spark" style="left:600px;top:300px;width:46px;" viewBox="0 0 100 100" fill="#6EE7B7"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
    <svg class="spark" style="left:120px;top:1180px;width:38px;" viewBox="0 0 100 100" fill="#FAF6EE"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
  </div>
</body>
</html>
