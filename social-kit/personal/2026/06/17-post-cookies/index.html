<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
<style>
  /* Post humor "cookies" 1080×1350 (4:5). Inter + acento por color. Firma abajo-izq (única).
     Render con render-statics.mjs. */
  :root{--green:#047857;--green-light:#6EE7B7;--cream:#FAF6EE;--ink:#13241c;--clay:#D97757}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1080px;height:1350px;overflow:hidden;font-family:"Inter",sans-serif;-webkit-font-smoothing:antialiased}
  .post{position:relative;width:1080px;height:1350px;overflow:hidden;padding:96px 88px;display:flex;flex-direction:column;
    background:radial-gradient(125% 95% at 28% 16%,#058a63 0%,#047857 52%,#02583c 100%)}
  .post::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.06;mix-blend-mode:multiply;
    background-image:radial-gradient(rgba(0,0,0,.6) 1px,transparent 1px);background-size:4px 4px}
  em{font-style:normal;color:var(--green-light)}

  /* Banner-gag de cookies (mock) */
  .cookiebar{display:flex;align-items:center;gap:18px;background:var(--cream);color:var(--ink);
    border-radius:20px;padding:22px 24px;box-shadow:0 24px 44px -22px rgba(2,16,10,.6);max-width:760px}
  .cookiebar .txt{font-size:27px;font-weight:600;line-height:1.25;flex:1}
  .cookiebar .btn{background:var(--green);color:var(--cream);font-weight:800;font-size:25px;
    padding:14px 26px;border-radius:999px;white-space:nowrap}

  .joke{margin-top:auto;margin-bottom:auto}
  .big{font-size:78px;font-weight:900;line-height:1.08;letter-spacing:-.035em;color:var(--cream)}
  .mid{margin-top:40px;font-size:46px;font-weight:600;line-height:1.28;color:rgba(250,246,238,.92)}
  .punch{margin-top:46px;display:flex;align-items:center;flex-wrap:wrap;gap:14px;font-size:42px;font-weight:600;color:rgba(250,246,238,.92)}
  .brand{display:inline-flex;align-items:center;gap:12px;background:var(--cream);border-radius:999px;padding:10px 22px 10px 14px;font-weight:800;font-size:38px;color:var(--ink)}
  .brand svg{width:42px;height:42px;display:block}

  .firma{position:absolute;left:88px;bottom:72px;display:flex;align-items:center;gap:15px;font-size:27px;font-weight:700;color:var(--cream)}
  .firma .dot{width:46px;height:46px;border-radius:50%;background:var(--cream);color:var(--green);display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:21px}
</style>
</head>
