<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  .demo-slide { padding: 64px 72px 96px; }
  .demo-slide__tag {
    display: inline-flex;
    align-items: center;
    padding: 8px 16px;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 22px;
    background: var(--cream);
  }
  .demo-slide__title {
    font-size: 78px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 14px;
  }
  .demo-slide__sub {
    font-size: 26px;
    line-height: 1.35;
    color: var(--muted);
    max-width: 700px;
    font-weight: 500;
  }
  .demo-slide__shot {
    margin-top: 36px;
    border: 2px solid var(--ink);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 12px 12px 0 var(--green);
    background: #fff;
  }
  .demo-slide__shot img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
  <div class="slide slide--cream demo-slide">
    <span class="demo-slide__tag">// agencia de marketing</span>
    <h2 class="demo-slide__title">eco.</h2>
    <p class="demo-slide__sub">Para quienes venden marca. Personalidad chunky + búsquedas con IA.</p>
    <div class="demo-slide__shot">
      <img src="../assets/captures/demo-eco-desktop.png" alt="" />
    </div>
    <p class="page-num">02 / 07</p>
    <span class="brand-mark"><span class="brand-mark__dot">eB</span>ebecerra.es</span>
  </div>
</body>
</html>
