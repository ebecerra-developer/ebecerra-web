<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1640px; height:624px; overflow:hidden; font-family:'Inter',sans-serif; }
  .stage {
    width:1640px; height:624px;
    background: linear-gradient(120deg, #047857 0%, #065F46 60%, #064E3B 100%);
    color:#FAFAF9;
    padding:96px 120px;
    display:flex; align-items:center; gap:60px;
    position:relative; overflow:hidden;
  }
  .stage::after { content:""; position:absolute; right:-100px; top:-100px; width:600px; height:600px; border-radius:50%; background:rgba(255,255,255,0.04); }
  .stage::before { content:""; position:absolute; left:-200px; bottom:-200px; width:600px; height:600px; border-radius:50%; background:rgba(255,255,255,0.03); }
  .logo {
    width:200px; height:200px; border-radius:40px;
    overflow:hidden; flex-shrink:0; position:relative;
    box-shadow: 0 12px 32px rgba(0,0,0,0.22);
  }
  .logo img { width:100%; height:100%; display:block; }
  .text { position:relative; }
  h1 { font-size:84px; font-weight:800; line-height:1.0; letter-spacing:-0.02em; }
  .sub { font-size:32px; opacity:.85; margin-top:20px; font-weight:400; }
  .url { font-size:30px; font-weight:700; margin-top:32px; letter-spacing:.04em; }
</style>
</head>
<body>
  <div class="stage">
    <div class="logo"><img src="../personal/avatars/avatar-eB-cream-512.png"></div>
    <div class="text">
      <h1>Enrique Becerra</h1>
      <div class="sub">Hago webs para autónomos y PYMEs · Sin plantillas, solo tú y yo.</div>
      <div class="url">ebecerra.es</div>
    </div>
  </div>
</body>
</html>
