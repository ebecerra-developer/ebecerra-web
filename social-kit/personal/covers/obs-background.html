<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@600;700;800;900&display=swap" />
<style>
  /* Fondo OBS — 1920×1080. Cream con textura editorial.
     ZONA WEBCAM RESERVADA: abajo-izquierda (libre).
     Marca: arriba-izquierda. Tagline: arriba-derecha.
     Centro libre para contenido del stream. */
  :root {
    --green:       #047857;
    --green-deep:  #024d33;
    --green-light: #6EE7B7;
    --gold:        #C2A15A;
    --cream:       #FAF6EE;
    --cream-warm:  #F2EAD5;
    --paper:       #ECE2C9;
    --walnut:      #2a1f12;
    --walnut-soft: #4a3a26;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden; background: #000;
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .bg {
    position: relative;
    width: 1920px; height: 1080px;
    /* Cream con sutil gradiente cálido (luz arriba-izquierda) */
    background:
      radial-gradient(120% 95% at 28% 22%, #FBF8F0 0%, #F4ECDB 55%, #EBDFC4 100%);
    overflow: hidden;
  }
  /* Textura papel — solo grano muy sutil de alta frecuencia.
     Fuera las líneas rayadas (creaban patrón regular que estorbaba
     la lectura del texto en tamaños pequeños / vídeo comprimido).
     z-index 1: debajo de todo el contenido. */
  .bg::after {
    content: ""; position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
    background-image: radial-gradient(rgba(42,31,18,0.22) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.45;
  }
  /* Viñeta tonal sutil (justo encima de la textura, debajo del contenido) */
  .bg::before {
    content: ""; position: absolute; inset: 0; z-index: 2;
    pointer-events: none;
    background: radial-gradient(110% 92% at 50% 48%, transparent 60%, rgba(74,58,38,0.18) 100%);
  }

  /* ─── MARCA arriba-izquierda (grande) ─── */
  .brand {
    position: absolute; z-index: 40;
    left: 88px; top: 88px;
    display: flex; align-items: center; gap: 32px;
  }
  .brand .logo {
    height: 130px;
    width: auto;
    display: block;
  }
  .brand .meta {
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .brand .meta .name {
    font-family: "Inter", sans-serif;
    font-weight: 800;
    font-size: 78px;
    line-height: 1;
    color: var(--walnut);
    letter-spacing: -0.018em;
  }
  .brand .meta .tag {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 500;
    font-style: italic;
    font-size: 38px;
    color: var(--green);
    line-height: 1;
    letter-spacing: -0.005em;
  }

  /* ─── TAGLINE arriba-derecha (grande) ─── */
  .live {
    position: absolute; z-index: 40;
    right: 96px; top: 96px;
    text-align: right;
    color: var(--walnut);
  }
  .live .kicker {
    display: inline-flex; align-items: center; gap: 16px;
    font-family: "Inter", sans-serif;
    font-weight: 800;
    font-size: 30px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--walnut);
  }
  .live .kicker .red-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #d83a3a;
    box-shadow: 0 0 0 6px rgba(216,58,58,0.18);
  }
  .live .big {
    margin-top: 18px;
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-style: italic;
    font-size: 110px;
    line-height: 0.95;
    color: var(--walnut);
    letter-spacing: -0.025em;
  }
  .live .big em {
    font-style: italic;
    color: var(--green);
  }

  /* ─── Líneas decorativas finas ─── */
  .rule {
    position: absolute; z-index: 18;
    background: var(--walnut);
    opacity: 0.16;
  }
  /* Línea horizontal larga bajo header */
  .rule--top { left: 88px; right: 88px; top: 280px; height: 1.5px; }

  /* ─── ZONA WEBCAM (abajo-izquierda) — visualmente reservada con líneas guía sutiles ─── */
  /* Marca el rectángulo donde irá la cámara para que no haya elementos pegados */
  .webcam-zone {
    position: absolute; z-index: 12;
    left: 88px; bottom: 88px;
    width: 540px; height: 540px;
    /* invisible — solo presencia conceptual; no se ve nada pero se respeta */
  }

  /* ─── Destellos / acentos pequeños, NO en centro ni en webcam zone ─── */
  .spark { position: absolute; z-index: 30; pointer-events: none; }
  .spark--a { right: 220px; bottom: 180px; width: 64px; }
  .spark--b { right: 420px; bottom: 320px; width: 42px; }
  .spark--c { right: 540px; bottom: 130px; width: 38px; }
  .spark--d { left: 700px; top: 380px; width: 36px; }

  /* ─── Handle abajo-derecha ─── */
  .handle-br {
    position: absolute; z-index: 40;
    right: 96px; bottom: 100px;
    display: flex; align-items: center; gap: 18px;
    color: var(--walnut);
  }
  .handle-br .url {
    font-family: "Inter", sans-serif;
    font-weight: 700;
    font-size: 36px;
    letter-spacing: -0.005em;
  }
  .handle-br .at {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: 30px;
    color: var(--green);
    opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="bg">

    <!-- MARCA arriba-izquierda -->
    <div class="brand">
      <img class="logo" src="../assets/avatars/logo-green.svg" alt="eB logo" />
      <div class="meta">
        <div class="name">ebecerra.es</div>
        <div class="tag">webs que trabajan por ti</div>
      </div>
    </div>

    <!-- Línea decorativa fina horizontal -->
    <div class="rule rule--top"></div>

    <!-- ZONA WEBCAM reservada (invisible) -->
    <div class="webcam-zone"></div>

    <!-- Handle abajo-derecha -->
    <div class="handle-br">
      <span class="at">@</span>
      <span class="url">ebecerra.es</span>
    </div>

  </div>
</body>
</html>
