<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@600;700;800;900&display=swap" />
<style>
  /*
    GBP COVER · fiel al tríptico 0024.
    Foto IZQUIERDA (solapa el marco → anclado) + marco blanco con el hook +
    2º mensaje outline "¿lo vemos juntos?" a la derecha.
    Logo (avatar redondeado eB) arriba-izq, "ebecerra.es" abajo-derecha.
    Llena 100vw×100vh; el script fija el viewport (16:9, 4:3, 3:2, 1:1).
  */
  :root {
    --green: #047857;
    --green-deep: #024d33;
    --green-light: #6EE7B7;
    --gold: #C2A15A;
    --cream: #FAF6EE;
    --walnut: #2a1f12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; }

  .cover {
    position: relative; width: 100vw; height: 100vh; overflow: hidden;
    background: radial-gradient(130% 100% at 30% 26%, #058a63 0%, #047857 48%, #02583c 100%);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* Grano SOLO sobre el verde de fondo: z-index 1 → detrás de foto, cuadro y textos */
  .cover::after {
    content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none;
    opacity: 0.07; mix-blend-mode: multiply;
    background-image: radial-gradient(rgba(0,0,0,0.6) 1px, transparent 1px);
    background-size: 4px 4px;
  }

  /* Marco blanco + hook = UNA pieza (el texto va dentro → se mueven juntos).
     Padding izquierdo grande: el texto centrado queda en la zona despejada,
     y el brazo solapa el margen blanco izquierdo (ancla el cuadro). */
  .frame-group { position: absolute; z-index: 6; inset: 0; transform: rotate(-1.4deg); }
  .frame {
    position: absolute;
    left: 30vmin; top: 50%; transform: translateY(-50%);
    width: 60vmin;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    padding: 6vmin 6vmin 6vmin 16vmin;
    box-shadow: 0 5vmin 5vmin -2.4vmin rgba(2,40,26,0.55);
  }
  /* Raya oscura DETRÁS del cuadro (offset abajo-derecha, z-index negativo) */
  .frame::before {
    content: ""; position: absolute; inset: 0; z-index: -1;
    border: 0.55vmin solid var(--green-deep);
    transform: translate(1.8vmin, 2vmin);
  }
  .hook {
    text-align: center;
    font-family: "Fraunces", Georgia, serif; font-weight: 600;
    font-size: 7.2vmin; line-height: 1.02; letter-spacing: -0.03em; color: var(--walnut);
  }
  .hook em { font-style: italic; color: var(--green); }

  /* 2º mensaje: outline a la derecha */
  .outline {
    position: absolute; z-index: 9;
    right: 5vmin; top: 50%; transform: translateY(-50%);
    text-align: left;
    font-family: "Fraunces", Georgia, serif; font-weight: 700;
    font-size: 9vmin; line-height: 1.06;
    color: var(--green);
    -webkit-text-stroke: 0.45vmin var(--cream); paint-order: stroke fill;
  }
  .outline .solid { display: block; -webkit-text-stroke: 0; color: var(--green-light); font-style: italic; }

  /* Foto recortada grande, IZQUIERDA, anclada abajo */
  .photo { position: absolute; z-index: 8; left: -2vmin; bottom: 0; height: 102vh; }
  .photo img {
    height: 100%; width: auto; display: block;
    filter: drop-shadow(2vmin 1vmin 3vmin rgba(2,40,26,0.4));
  }

  /* Logo solo (avatar redondeado) arriba-izquierda */
  .logo {
    position: absolute; z-index: 14; top: 4.5vmin; left: 5vmin;
    width: 13vmin; height: 13vmin; border-radius: 3vmin; overflow: hidden;
    box-shadow: 0 1.2vmin 3vmin rgba(0,0,0,0.25);
  }
  .logo img { width: 100%; height: 100%; display: block; }

  /* ebecerra.es abajo-derecha (con icono de globo) */
  .url {
    position: absolute; z-index: 14; bottom: 5vmin; right: 6vmin;
    display: inline-flex; align-items: center; gap: 1.1vmin;
    font-family: "Inter", sans-serif; font-weight: 700; font-size: 3vmin;
    letter-spacing: 0.04em; color: var(--cream);
    text-shadow: 0 0.2vmin 1.4vmin rgba(0,0,0,0.45);
  }
  .url svg {
    width: 3.4vmin; height: 3.4vmin; flex-shrink: 0;
    filter: drop-shadow(0 0.2vmin 1vmin rgba(0,0,0,0.45));
  }

  /* Destellos */
  .spark { position: absolute; z-index: 11; }
  .spark--a { right: 6vmin; top: 12vmin; width: 4.4vmin; }
  .spark--b { right: 24vmin; bottom: 14vmin; width: 2.8vmin; }
  .spark--c { left: 6vmin; bottom: 8vmin; width: 2.4vmin; }

  /* Cuadrado/estrecho: no caben los 3 elementos → ocultar 2º mensaje */
  @media (max-aspect-ratio: 6/5) {
    .outline { display: none; }
    .frame { left: 29vmin; width: 64vmin; padding: 6vmin 6vmin 6vmin 17vmin; }
    .hook { font-size: 7.6vmin; }
    .spark--a { right: 7vmin; top: 9vmin; }
    .spark--b { right: 8vmin; bottom: 14vmin; }
  }
</style>
</head>
<body>
  <div class="cover">
    <div class="frame-group">
      <div class="frame">
        <div class="hook">Hago webs<br/>que dan<br/><em>resultados</em>.</div>
      </div>
    </div>

    <div class="outline">¿lo<br/>vemos<br/><span class="solid">juntos?</span></div>

    <div class="photo">
      <img src="../assets/yo/Quique-corporativo-sin-fondo.png" alt="Enrique Becerra" />
    </div>

    <div class="logo"><img src="../assets/avatars/avatar-eB-cream-512.png" alt="eB" /></div>
    <div class="url">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.5 3.8 5.8 3.8 9s-1.3 6.5-3.8 9c-2.5-2.5-3.8-5.8-3.8-9s1.3-6.5 3.8-9z"/></svg>
      ebecerra.es
    </div>

    <svg class="spark spark--a" viewBox="0 0 100 100" fill="#6EE7B7"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
    <svg class="spark spark--b" viewBox="0 0 100 100" fill="#FAF6EE"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
    <svg class="spark spark--c" viewBox="0 0 100 100" fill="#C2A15A"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
  </div>
</body>
</html>
