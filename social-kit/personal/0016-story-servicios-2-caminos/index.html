<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" />
<style>
  :root {
    --green: #047857;
    --cream: #FAFAF9;
    --ink: #0A0A0A;
    --muted: #525252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  .stage {
    position: relative; width: 1080px; height: 1920px;
    background: var(--cream); overflow: hidden;
  }
  .stage::after {
    content: ""; position: absolute; inset: 0;
    pointer-events: none; opacity: 0.18; mix-blend-mode: multiply;
    background-image: radial-gradient(rgba(0,0,0,0.5) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 50;
  }

  .corner {
    position: absolute; top: 80px; left: 80px;
    display: flex; align-items: center; gap: 14px;
    color: var(--ink); font-weight: 800; font-size: 26px;
    z-index: 40;
  }
  .corner .dot {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--green); color: var(--cream);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900;
  }
  .corner--light { color: var(--cream); }
  .corner--light .dot { background: var(--cream); color: var(--green); }

  .scene { position: absolute; inset: 0; opacity: 0; padding: 240px 80px 200px; }
  .scene--green { background: var(--green); color: var(--cream); }

  #s1 {
    display: flex; flex-direction: column; align-items: flex-start;
    justify-content: center; padding-top: 0;
  }
  #s1 .big {
    font-size: 170px; font-weight: 900;
    letter-spacing: -0.045em; line-height: 0.9;
    color: var(--ink);
  }
  #s1 .big em { font-style: normal; color: var(--green); }
  #s1 .sub {
    margin-top: 50px;
    font-size: 44px; font-weight: 600;
    color: var(--muted); line-height: 1.3;
  }

  /* S2 — dos cards verticales */
  #s2 {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding-top: 0;
    gap: 36px;
  }
  .card {
    width: 100%;
    background: #fff;
    border: 4px solid var(--ink);
    border-radius: 28px;
    padding: 40px 44px;
    box-shadow: 14px 14px 0 var(--green);
    color: var(--ink);
  }
  .card--b { box-shadow: 14px 14px 0 #FF6B4A; }
  .card__tag {
    display: inline-block;
    font-size: 22px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--ink); color: var(--cream);
    padding: 10px 22px; border-radius: 999px;
    margin-bottom: 24px;
  }
  .card__tag--b { background: #FF6B4A; }
  .card__title {
    font-size: 64px; font-weight: 900;
    letter-spacing: -0.025em; line-height: 1;
    margin-bottom: 26px;
  }
  .card__title em { font-style: normal; color: var(--green); }
  .card--b .card__title em { color: #FF6B4A; }
  .card__line {
    font-size: 32px; font-weight: 600;
    color: var(--muted); line-height: 1.35;
    margin-bottom: 8px;
  }

  /* S3 */
  #s3 {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding-top: 0;
  }
  #s3 .big {
    font-size: 130px; font-weight: 900;
    letter-spacing: -0.045em; line-height: 0.92;
  }
  #s3 .big em { font-style: normal; color: #6EE7B7; }
  #s3 .url-pill {
    margin-top: 60px;
    display: inline-block;
    background: var(--cream); color: var(--green);
    font-size: 48px; font-weight: 800;
    padding: 22px 42px; border-radius: 999px;
  }
  #s3 .sub {
    margin-top: 50px;
    font-size: 30px; font-weight: 600;
    opacity: 0.9;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="corner"><span class="dot">eB</span> servicios</div>

    <div class="scene" id="s1">
      <div class="big">Cómo <em>pagar</em><br/>tu web.</div>
      <div class="sub">Ahora lo eliges tú.</div>
    </div>

    <div class="scene" id="s2">
      <div class="card" id="cardA">
        <span class="card__tag">Camino A</span>
        <div class="card__title"><em>Contrato</em></div>
        <div class="card__line">Setup + cuota mensual.</div>
        <div class="card__line">Hosting y soporte incluidos.</div>
      </div>
      <div class="card card--b" id="cardB">
        <span class="card__tag card__tag--b">Camino B</span>
        <div class="card__title"><em>Pago único</em></div>
        <div class="card__line">Una vez.</div>
        <div class="card__line">Sin permanencia.</div>
      </div>
    </div>

    <div class="scene scene--green" id="s3">
      <div class="corner corner--light"><span class="dot">eB</span> servicios</div>
      <div class="big">Mismo <em>trato</em>.<br/>Tú decides cómo.</div>
      <div class="url-pill">ebecerra.es/#servicios</div>
      <div class="sub">Sticker link abajo ↓</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ defaults: { ease: "power3.out" }, paused: true });
    const FADE_OUT = { immediateRender: false };
    window.__tl = tl;
    window.__startAnim = () => tl.play(0);

    // S1 visible desde t=0
    gsap.set("#s1", { opacity: 1 });
    gsap.set("#s1 .big", { y: 0, opacity: 1 });
    gsap.set("#s1 .sub", { y: 0, opacity: 1 });
    tl.fromTo("#s1", { opacity: 1 }, { opacity: 0, duration: 0.5, ...FADE_OUT }, 2.8);

    // S2 (3.0 → 7.5s) — cards entran escalonadas
    tl.fromTo("#s2", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 3.0);
    tl.fromTo("#cardA", { y: 60, opacity: 0 }, { y: 0, opacity: 1, duration: 0.85 }, 3.2);
    tl.fromTo("#cardB", { y: 60, opacity: 0 }, { y: 0, opacity: 1, duration: 0.85 }, 4.2);
    tl.fromTo("#s2", { opacity: 1 }, { opacity: 0, duration: 0.5, ...FADE_OUT }, 7.5);

    // S3 (7.7 → 10.5s)
    tl.fromTo("#s3", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 7.7);
    tl.fromTo("#s3 .big", { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.85 }, 7.9);
    tl.fromTo("#s3 .url-pill", { scale: 0.75, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.65 }, 8.75);
    tl.fromTo("#s3 .sub", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 9.4);
  </script>
</body>
</html>
