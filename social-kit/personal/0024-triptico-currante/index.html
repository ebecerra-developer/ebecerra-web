<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@600;700;800;900&family=Syne:wght@700;800&display=swap" />
<style>
  /*
    TRÍPTICO MURAL v5 — verde corporativo (degradado sutil, sin pinceladas) +
    foto recortada grande izquierda + marco grande interior blanco con borde
    walnut + filete dorado + frase centrada en panel 2 + panel 3 outline +
    destellos + logo arriba-izquierda. Master 3240×1350.
  */
  :root {
    --green:       #047857;
    --green-deep:  #024d33;
    --green-light: #6EE7B7;
    --gold:        #C2A15A;
    --cream:       #FAF6EE;
    --white:       #ffffff;
    --walnut:      #2a1f12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 3240px; height: 1350px;
    overflow: hidden; background: #000;
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .mural {
    position: relative; width: 3240px; height: 1350px;
    background: radial-gradient(130% 100% at 30% 26%, #058a63 0%, #047857 48%, #02583c 100%);
    overflow: hidden;
  }
  /* Grano sutil global */
  .mural::after {
    content: ""; position: absolute; inset: 0; z-index: 22;
    pointer-events: none; opacity: 0.07; mix-blend-mode: multiply;
    background-image: radial-gradient(rgba(0,0,0,0.6) 1px, transparent 1px);
    background-size: 4px 4px;
  }

  /* ── Marco grande interior blanco, borde VERDE + filete dorado, girado ── */
  /* Marco + texto agrupados para girarlos juntos (giro sutil + sombra) */
  .frame-group {
    position: absolute; inset: 0; z-index: 6;
    transform: rotate(-1.4deg);
    transform-origin: 1620px 700px;
  }
  .frame {
    position: absolute;
    left: 510px; top: 280px;
    width: 1900px; height: 820px;
    background: var(--white);
    /* Sombra marcada SOLO hacia abajo (spread negativo recorta los lados) */
    box-shadow: 0 64px 64px -30px rgba(2,40,26,0.62);
  }
  /* Borde verde "suelto" desplazado abajo-derecha (detrás del rectángulo) */
  .frame::before {
    content: ""; position: absolute; inset: 0;
    border: 6px solid var(--green-deep);
    transform: translate(28px, 30px);
    z-index: -1;
    pointer-events: none;
  }

  /* Frase gancho — CENTRADA en el panel 2 (x 1080–2160, centro 1620) */
  .hook {
    position: absolute; z-index: 10;
    left: 1090px; width: 1060px;
    top: 410px;
    text-align: center;
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: 152px;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--walnut);
  }
  .hook em { font-style: italic; color: var(--green); }

  /* ── Foto recortada grande (izquierda), centrada en panel 1 ── */
  .photo {
    position: absolute; z-index: 8;
    left: 50px; top: -50px;
    height: 1860px;
  }
  .photo img { height: 1860px; width: auto; display: block; }

  /* ── Panel 3: texto outline + destellos ── */
  .outline-text {
    position: absolute; z-index: 9;
    /* Alineado a la izquierda en el espacio libre del panel 3 */
    left: 2500px; top: 355px;
    text-align: left;
    font-family: "Fraunces", Georgia, serif;
    font-weight: 700;
    font-size: 188px;
    line-height: 1.08;
    /* Relleno = color del fondo (letras sólidas, sin cruces raros) + borde cream */
    color: var(--green);
    -webkit-text-stroke: 4px var(--cream);
    paint-order: stroke fill;
  }
  .outline-text .solid {
    display: block;
    -webkit-text-stroke: 0;
    color: var(--green-light);
    font-style: italic;
  }

  .spark { position: absolute; z-index: 11; }
  .spark--a { left: 3050px; top: 250px; width: 130px; }
  .spark--b { left: 2440px; top: 1010px; width: 92px; }
  .spark--c { left: 3110px; top: 980px; width: 64px; }

  /* ── Logo arriba-izquierda, grande ── */
  .brand {
    position: absolute; z-index: 14;
    left: 96px; top: 84px;
    display: flex; align-items: center; gap: 20px;
    font-family: "Inter", sans-serif;
    color: var(--cream);
    font-weight: 700; font-size: 46px;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.35);
  }
  .brand .dot {
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--cream); color: var(--green);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 34px; font-weight: 900;
  }
</style>
</head>
<body>
  <div class="mural">

    <!-- Logo arriba izquierda -->
    <div class="brand"><span class="dot">eB</span>ebecerra.es</div>

    <!-- Marco grande interior blanco + frase (girados juntos) -->
    <div class="frame-group">
      <div class="frame"></div>
      <div class="hook">Hago webs<br/>que dan<br/><em>resultados</em>.</div>
    </div>

    <!-- Foto recortada grande -->
    <div class="photo">
      <img src="../assets/yo/Quique-corporativo-sin-fondo.png" alt="Enrique Becerra" />
    </div>

    <!-- Panel 3: outline + destellos -->
    <div class="outline-text">¿lo<br/>vemos<br/><span class="solid">juntos?</span></div>

    <svg class="spark spark--a" viewBox="0 0 100 100" fill="#6EE7B7"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
    <svg class="spark spark--b" viewBox="0 0 100 100" fill="#FAF6EE"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>
    <svg class="spark spark--c" viewBox="0 0 100 100" fill="#C2A15A"><path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0Z"/></svg>

  </div>
</body>
</html>
