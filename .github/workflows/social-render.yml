name: Social Render

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "UUID del job en social_render_jobs"
        required: true
        type: string

# Cancelar runs duplicadas del mismo job (caso raro pero posible).
concurrency:
  group: social-render-${{ inputs.job_id }}
  cancel-in-progress: false

# Versión de Playwright. Cuando bumpees @supabase/supabase-js o playwright en
# social-templates/package.json, actualiza este número para invalidar el cache.
env:
  PLAYWRIGHT_VERSION: "1.48.0"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: social-templates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        # @supabase/supabase-js v2.50+ usa @supabase/realtime-js que requiere
        # WebSocket nativo (Node 22+). En Node 20 falla con "Node.js 20 detected
        # without native WebSocket support".
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: social-templates/package.json

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Key estable mientras no cambiemos la versión de Playwright. El cache
          # guarda solo el binario de Chromium (~150MB) — sus deps del SO se
          # instalan en cada run con install-deps (apt, ~5-10s).
          key: playwright-chromium-${{ env.PLAYWRIGHT_VERSION }}-${{ runner.os }}

      - name: Install Playwright Chromium (si cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright system deps
        # Las deps apt no se pueden cachear razonablemente; siempre se instalan.
        # Si ya están en la VM (no es nuestro caso) este step es near-instant.
        run: npx playwright install-deps chromium

      - name: Check secrets are present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          missing=0
          [ -z "$SUPABASE_URL" ] && { echo "::error::Missing secret SUPABASE_URL"; missing=1; }
          [ -z "$SUPABASE_SECRET_KEY" ] && { echo "::error::Missing secret SUPABASE_SECRET_KEY"; missing=1; }
          [ -z "${{ inputs.job_id }}" ] && { echo "::error::Empty job_id input"; missing=1; }
          exit $missing

      - name: Render job
        id: render
        env:
          JOB_ID: ${{ inputs.job_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          set +e
          node render-job.mjs 2>&1 | tee render-output.log
          EXIT=${PIPESTATUS[0]}
          echo "Exit code: $EXIT"
          exit $EXIT

      - name: Upload render log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: render-output-${{ inputs.job_id }}
          path: social-templates/render-output.log
          retention-days: 7
