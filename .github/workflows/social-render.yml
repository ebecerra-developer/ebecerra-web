name: Social Render

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "UUID del job en social_render_jobs"
        required: true
        type: string

# Cancelar runs duplicadas del mismo job (caso raro pero posible).
concurrency:
  group: social-render-${{ inputs.job_id }}
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: social-templates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        # @supabase/supabase-js v2.50+ usa @supabase/realtime-js que requiere
        # WebSocket nativo (Node 22+). En Node 20 falla con "Node.js 20 detected
        # without native WebSocket support".
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: social-templates/package.json

      - name: Install dependencies
        run: |
          npm install --no-package-lock --loglevel=info
          echo "--- node_modules contents ---"
          ls node_modules/ 2>/dev/null | head -30 || echo "NO node_modules/"
          echo "--- check key modules ---"
          [ -d node_modules/@supabase/supabase-js ] && echo "✓ @supabase/supabase-js" || echo "❌ MISSING @supabase/supabase-js"
          [ -d node_modules/playwright ] && echo "✓ playwright" || echo "❌ MISSING playwright"

      - name: Try imports (diagnostic)
        run: |
          node --version
          node -e "import('@supabase/supabase-js').then(m=>console.log('✓ supabase-js:',Object.keys(m).slice(0,3))).catch(e=>{console.error('❌ supabase-js:',e.message);process.exit(1)})"
          node -e "import('playwright').then(m=>console.log('✓ playwright:',Object.keys(m).slice(0,3))).catch(e=>{console.error('❌ playwright:',e.message);process.exit(1)})"
          node -e "import('./engine.mjs').then(m=>console.log('✓ engine.mjs:',Object.keys(m))).catch(e=>{console.error('❌ engine.mjs:',e.message);process.exit(1)})"

      - name: Install Playwright browser (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Check secrets are present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          missing=0
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Missing secret SUPABASE_URL (repo Settings → Secrets and variables → Actions)"
            missing=1
          else
            echo "✓ SUPABASE_URL present (${#SUPABASE_URL} chars)"
          fi
          if [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "::error::Missing secret SUPABASE_SECRET_KEY"
            missing=1
          else
            echo "✓ SUPABASE_SECRET_KEY present (${#SUPABASE_SECRET_KEY} chars)"
          fi
          if [ -z "${{ inputs.job_id }}" ]; then
            echo "::error::workflow input job_id is empty"
            missing=1
          else
            echo "✓ job_id input: ${{ inputs.job_id }}"
          fi
          exit $missing

      - name: Ping Supabase REST (aisla red/auth del script)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          # Trim posibles \n por copy-paste
          URL="$(echo -n "$SUPABASE_URL" | tr -d '[:space:]')"
          KEY="$(echo -n "$SUPABASE_SECRET_KEY" | tr -d '[:space:]')"
          echo "URL hash: $(echo -n "$URL" | sha256sum | cut -c1-12)"
          echo "KEY hash: $(echo -n "$KEY" | sha256sum | cut -c1-12)"
          code="$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            "$URL/rest/v1/social_render_jobs?select=id&limit=1")"
          echo "Supabase REST status: $code"
          if [ "$code" != "200" ]; then
            echo "::error::Supabase REST devolvió $code — revisa URL/KEY"
            exit 1
          fi

      - name: Render job
        id: render
        env:
          JOB_ID: ${{ inputs.job_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          set +e
          node render-job.mjs 2>&1 | tee render-output.log
          EXIT=${PIPESTATUS[0]}
          echo "::group::Render output (also uploaded as artifact)"
          cat render-output.log
          echo "::endgroup::"
          echo "Exit code: $EXIT"
          exit $EXIT

      - name: Upload render log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-output-${{ inputs.job_id }}
          path: social-templates/render-output.log
          retention-days: 7
